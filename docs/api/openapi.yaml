                  type: integer
                unique_routes:
                  type: integer
                avg_events_per_user:
                  type: number
            performance:
              type: object
              required: [slow_threshold_ms, avg_duration_ms, max_duration_ms, slow_requests, total_requests, top_slow_routes]
              properties:
                slow_threshold_ms:
                  type: integer
                avg_duration_ms:
