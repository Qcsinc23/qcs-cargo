# QCS Cargo (Go Fiber + SQLite) — Production for qcs-cargo.com
# Traefik: HTTPS, Host qcs-cargo.com and www.qcs-cargo.com

networks:
  dokploy-network:
    external: true
  qcs-cargo-network:
    driver: bridge

services:
  qcs-cargo:
    build:
      context: .
      dockerfile: Dockerfile
    image: qcs-cargo:latest
    container_name: qcs_cargo
    restart: unless-stopped
    environment:
      - DATABASE_URL=file:/data/qcs.db?_journal_mode=WAL
      - JWT_SECRET=${JWT_SECRET}
      - PORT=8080
      - APP_URL=https://qcs-cargo.com
      - ALLOWED_ORIGINS=https://qcs-cargo.com,https://www.qcs-cargo.com
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - FROM_EMAIL=${FROM_EMAIL:-noreply@qcs-cargo.com}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - UPLOAD_DIR=/data/uploads
    volumes:
      - qcs_cargo_data:/data
    networks:
      - qcs-cargo-network
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.qcs-cargo-http.rule=Host(`qcs-cargo.com`) || Host(`www.qcs-cargo.com`)"
      - "traefik.http.routers.qcs-cargo-http.entrypoints=web"
      - "traefik.http.routers.qcs-cargo-http.middlewares=qcs-cargo-https-redirect"
      - "traefik.http.middlewares.qcs-cargo-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.qcs-cargo-https-redirect.redirectscheme.permanent=true"
      - "traefik.http.routers.qcs-cargo.rule=Host(`qcs-cargo.com`) || Host(`www.qcs-cargo.com`)"
      - "traefik.http.routers.qcs-cargo.entrypoints=websecure"
      - "traefik.http.routers.qcs-cargo.tls=true"
      - "traefik.http.routers.qcs-cargo.tls.certresolver=letsencrypt"
      - "traefik.http.routers.qcs-cargo.middlewares=qcs-cargo-www-redirect,qcs-cargo-security-headers"
      - "traefik.http.middlewares.qcs-cargo-www-redirect.redirectregex.regex=^https://www\\.(.+)"
      - "traefik.http.middlewares.qcs-cargo-www-redirect.redirectregex.replacement=https://$${1}"
      - "traefik.http.middlewares.qcs-cargo-www-redirect.redirectregex.permanent=true"
      - "traefik.http.middlewares.qcs-cargo-security-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.qcs-cargo-security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.qcs-cargo-security-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.qcs-cargo-security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.qcs-cargo-security-headers.headers.stsSeconds=31536000"
      - "traefik.http.services.qcs-cargo.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  qcs_cargo_data:
