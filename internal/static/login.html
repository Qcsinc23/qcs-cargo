<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | QCS Cargo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>body{font-family:'Inter',sans-serif}h1,h2{font-family:'Plus Jakarta Sans',sans-serif}</style>
</head>
<body class="bg-[#F8FAFC] text-[#0F172A] min-h-screen">
  <header class="bg-[#0F172A] text-white py-4 px-6">
    <nav class="max-w-6xl mx-auto flex justify-between items-center">
      <a href="/" class="font-bold text-lg">QCS Cargo</a>
      <div class="flex gap-6">
        <a href="/how-it-works">How It Works</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
        <a href="/register" class="bg-[#F97316] text-white px-4 py-2 rounded-lg font-medium">Get My Free Address</a>
      </div>
    </nav>
  </header>
  <main class="max-w-md mx-auto px-6 py-16">
    <h1 class="text-3xl font-bold text-[#0F172A] mb-8">Sign In</h1>
    <p class="text-slate-600 mb-6">Enter your email and we’ll send you a sign-in link (no password needed).</p>
    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input type="email" name="email" required class="w-full h-10 rounded-lg border border-slate-200 px-3" placeholder="you@example.com" />
      </div>
      <button type="submit" class="w-full bg-[#2563EB] text-white py-2 rounded-lg font-medium h-10">Send magic link</button>
    </form>
    <p id="form-status" class="mt-4 text-sm hidden"></p>
    <p class="mt-6 text-slate-600">Don’t have an account? <a href="/register" class="text-[#2563EB] font-medium">Sign up</a></p>
  </main>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = e.target.email.value;
      const status = document.getElementById('form-status');
      status.classList.remove('hidden');
      try {
        const r = await fetch('/api/v1/auth/magic-link/request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const j = await r.json();
        if (r.ok) { status.textContent = 'Check your email for the sign-in link.'; status.className = 'mt-4 text-sm text-green-600'; }
        else { status.textContent = j.error?.message || 'Request failed.'; status.className = 'mt-4 text-sm text-red-600'; }
      } catch (err) { status.textContent = 'Network error.'; status.className = 'mt-4 text-sm text-red-600'; }
    });
  </script>
</body>
</html>
