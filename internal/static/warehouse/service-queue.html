<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service Queue | QCS Cargo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/admin/common.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="bg-[#F8FAFC] text-[#0F172A] min-h-screen">
  <div id="app">Loading…</div>
  <script>
    (function() {
      const token = localStorage.getItem('qcs_access_token');
      if (!token) { window.location.href = '/login?redirect=' + encodeURIComponent('/warehouse/service-queue'); return; }
      const auth = { headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' } };
      fetch('/api/v1/me', auth).then(r => {
        if (!r.ok) { window.location.href = '/login?redirect=' + encodeURIComponent('/warehouse/service-queue'); return null; }
        return r.json();
      }).then(me => {
        if (!me) return;
        const role = (me.data && me.data.role) || '';
        if (role !== 'staff' && role !== 'admin') { window.location.href = '/dashboard'; return; }
        const userID = (me.data && me.data.id) || '';
        const sidebar = '<aside class="w-64 bg-[#0F172A] text-white py-6 px-4"><a href="/" class="font-bold text-lg block mb-8">QCS Cargo</a><p class="text-amber-400 text-sm font-medium mb-2">Warehouse</p><nav class="space-y-1">' +
          '<a href="/warehouse" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Dashboard</a>' +
          '<a href="/warehouse/locker-receive" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Locker Receive</a>' +
          '<a href="/warehouse/service-queue" class="block py-2 px-3 rounded-lg bg-[#1E293B]">Service Queue</a>' +
          '<a href="/warehouse/ship-queue" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Ship Queue</a>' +
          '<a href="/warehouse/packages" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Packages</a>' +
          '<a href="/warehouse/receiving" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Receiving</a>' +
          '<a href="/warehouse/staging" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Staging</a>' +
          '<a href="/warehouse/manifests" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Manifests</a>' +
          '<a href="/warehouse/exceptions" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Exceptions</a></nav>' +
          '<a href="/admin" class="block mt-6 text-sm text-slate-400 hover:text-white">Admin</a><a href="/dashboard" class="block mt-2 text-sm text-slate-400 hover:text-white">Customer Dashboard</a><button type="button" class="sidebar-logout mt-4 text-sm text-slate-400 hover:text-white">Sign out</button></aside>';
        function render(list) {
          // Pass 2 audit fix C-1: HTML-escape user_name and sender_name —
          // both customer-controlled and historically the XSS sink.
          const esc = window.QCSAdmin.escapeHTML;
          const rows = (list || []).map(sr => {
            const created = sr.created_at ? new Date(sr.created_at).toLocaleString() : '—';
            return '<tr class="border-b border-slate-200"><td class="py-3 px-4">' + esc(sr.user_name || '—') + '</td><td class="py-3 px-4">' + esc(sr.sender_name || '—') + '</td><td class="py-3 px-4">' + esc(sr.service_type || '—') + '</td><td class="py-3 px-4">' + esc(sr.status || '') + '</td><td class="py-3 px-4">' + esc(created) + '</td><td class="py-3 px-4">' + esc(sr.storage_bay || '—') + '</td><td class="py-3 px-4"><button type="button" class="complete-btn bg-emerald-600 text-white px-3 py-1 rounded text-sm" data-id="' + esc(sr.id) + '">Complete</button></td></tr>';
          }).join('');
          return '<main class="flex-1 p-8"><nav aria-label="Breadcrumb" class="mb-4"><ol class="flex items-center gap-2 text-sm text-slate-600"><li><a href="/warehouse" class="hover:underline">Warehouse</a></li><li aria-current="page" class="font-medium">Service Queue</li></ol></nav><h1 class="text-3xl font-bold mb-6">Service Queue</h1><div class="bg-white rounded-xl border border-slate-200 overflow-hidden"><table class="w-full"><thead class="bg-slate-50"><tr><th class="text-left py-3 px-4">Customer</th><th class="text-left py-3 px-4">Sender</th><th class="text-left py-3 px-4">Service</th><th class="text-left py-3 px-4">Status</th><th class="text-left py-3 px-4">Created</th><th class="text-left py-3 px-4">Bay</th><th class="text-left py-3 px-4">Action</th></tr></thead><tbody id="tbody">' + rows + '</tbody></table></div></main>';
        }
        function load() {
          fetch('/api/v1/warehouse/service-queue', auth).then(r => r.json()).then(j => {
            const list = (j && j.data) || [];
            document.getElementById('root').innerHTML = render(list);
            document.querySelectorAll('.complete-btn').forEach(btn => {
              btn.onclick = function() {
                const id = this.getAttribute('data-id');
                fetch('/api/v1/warehouse/service-queue/' + id, { method: 'PATCH', headers: auth.headers, body: JSON.stringify({ status: 'completed', completed_by: userID }) })
                  .then(r => { if (r.ok) load(); });
              };
            });
          });
        }
        document.getElementById('app').innerHTML = '<div class="flex min-h-screen">' + sidebar + '<div id="root">' + render([]) + '</div></div>';
        var lb = document.querySelector('.sidebar-logout'); if (lb) lb.onclick = function() { fetch('/api/v1/auth/logout', { method: 'POST', credentials: 'include' }).then(function() { localStorage.removeItem('qcs_access_token'); window.location.href = '/'; }); };
        load();
      });
    })();
  </script>
</body>
</html>
