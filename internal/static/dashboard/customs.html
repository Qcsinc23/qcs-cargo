<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customs Declaration | QCS Cargo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>body{font-family:'Inter',sans-serif}h1,h2{font-family:'Plus Jakarta Sans',sans-serif}</style>
  <link rel="stylesheet" href="/dashboard/mobile-nav.css" />
</head>
<body class="bg-[#F8FAFC] text-[#0F172A] min-h-screen">
  <div id="app">Loading…</div>
  <script>
    (function() {
      const token = localStorage.getItem('qcs_access_token');
      if (!token) { window.location.href = '/login?redirect=' + encodeURIComponent(window.location.pathname); return; }
      const pathParts = window.location.pathname.split('/').filter(Boolean);
      const idx = pathParts.indexOf('ship-requests');
      const id = idx >= 0 && pathParts[idx + 1] && pathParts[idx + 1] !== 'customs' ? pathParts[idx + 1] : null;
      if (!id) { window.location.href = '/dashboard/ship-requests'; return; }
      const auth = { headers: { 'Authorization': 'Bearer ' + token } };

      function sidebar(user, active) {
        const suiteCode = (user && user.suite_code) || '—';
        return '<div class="flex min-h-screen"><aside class="w-64 bg-[#0F172A] text-white py-6 px-4">' +
          '<a href="/" class="font-bold text-lg block mb-8">QCS Cargo</a>' +
          '<nav class="space-y-1">' +
          '<a href="/dashboard" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Dashboard</a>' +
          '<a href="/dashboard/inbox" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">My Packages</a>' +
          '<a href="/dashboard/mailbox" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">My Mailbox</a>' +
          '<a href="/dashboard/ship" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Ship My Packages</a>' +
          '<a href="/dashboard/ship-requests" class="block py-2 px-3 rounded-lg ' + (active === 'ship-requests' ? 'bg-[#1E293B]' : 'hover:bg-[#1E293B]') + '">Ship Requests</a>' +
          '<a href="/dashboard/recipients" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Recipients</a>' +
          '</nav><p class="mt-8 text-slate-400 text-sm">Suite: ' + suiteCode + '</p>' +
          '<button type="button" id="logout-btn" class="mt-4 text-sm text-slate-400 hover:text-white">Sign out</button></aside>';
      }

      fetch('/api/v1/me', auth).then(r => r.ok ? r.json() : null).then(me => {
        if (!me) { window.location.href = '/login'; return; }
        const user = me.data;
        fetch('/api/v1/ship-requests/' + id, auth).then(r => r.ok ? r.json() : null).then(res => {
          if (!res || !res.data) {
            document.getElementById('app').innerHTML = '<div class="p-8"><p>Ship request not found.</p><a href="/dashboard/ship-requests" class="text-[#2563EB]">Back to list</a></div>';
            return;
          }
          const sr = res.data.ship_request || res.data;
          const items = res.data.items || [];
          const status = (sr.status || '').toLowerCase();
          if (status !== 'draft' && status !== 'pending_customs') {
            document.getElementById('app').innerHTML = sidebar(user, 'ship-requests') +
              '<main class="flex-1 p-8"><p class="text-amber-700">Customs can only be submitted for draft or pending_customs requests.</p>' +
              '<a href="/dashboard/ship-requests/' + id + '" class="text-[#2563EB] mt-4 inline-block">Back to ship request</a></main></div>';
            document.getElementById('logout-btn').onclick = () => { fetch('/api/v1/auth/logout', { method: 'POST', credentials: 'include' }).then(() => { localStorage.removeItem('qcs_access_token'); window.location.href = '/'; }); };
            return;
          }
          let formHtml = '<main class="flex-1 p-8">' +
            '<nav aria-label="Breadcrumb" class="mb-4"><ol class="flex items-center gap-2 text-sm text-slate-600"><li><a href="/dashboard" class="text-[#2563EB] hover:underline">Dashboard</a></li><li aria-hidden="true">/</li><li><a href="/dashboard/ship-requests" class="text-[#2563EB] hover:underline">Ship Requests</a></li><li aria-hidden="true">/</li><li><a href="/dashboard/ship-requests/' + id + '" class="text-[#2563EB] hover:underline">Request</a></li><li aria-hidden="true">/</li><li class="text-[#0F172A] font-medium" aria-current="page">Customs</li></ol></nav>' +
            '<a href="/dashboard/ship-requests/' + id + '" class="text-[#2563EB] mb-6 inline-block">← Back to ship request</a>' +
            '<h1 class="text-3xl font-bold text-[#0F172A] mb-1">Customs declaration</h1>' +
            '<p class="text-slate-500 mb-6">' + (sr.confirmation_code || id) + '</p>' +
            '<form id="customs-form" class="space-y-6">';
          function str(v) { return typeof v === 'string' ? v : (v && v.String) != null ? v.String : ''; }
          function num(v) { if (typeof v === 'number' && !isNaN(v)) return v; if (v && v.Valid && v.Float64 != null) return v.Float64; if (v && v.Valid && v.Int64 != null) return v.Int64; return ''; }
          items.forEach((it, i) => {
            const desc = str(it.customs_description);
            const val = num(it.customs_value);
            const qty = it.customs_quantity != null && it.customs_quantity.Valid ? it.customs_quantity.Int64 : (typeof it.customs_quantity === 'number' ? it.customs_quantity : '');
            const hs = str(it.customs_hs_code);
            const origin = str(it.customs_country_of_origin);
            const w = num(it.customs_weight_lbs);
            formHtml += '<div class="bg-white rounded-xl border border-slate-200 p-6">' +
              '<h2 class="text-lg font-semibold text-[#0F172A] mb-4">Item ' + (i + 1) + ' (Package ' + (it.locker_package_id || it.id).slice(0, 8) + '…)</h2>' +
              '<input type="hidden" name="items[' + i + '].id" value="' + (it.id || '') + '">' +
              '<div class="grid gap-4 md:grid-cols-2">' +
              '<div><label class="block text-sm font-medium text-slate-600 mb-1">Description</label><input type="text" name="items[' + i + '].description" value="' + (desc || '').replace(/"/g, '&quot;') + '" class="w-full rounded-lg border border-slate-300 px-3 py-2" placeholder="e.g. Clothing"></div>' +
              '<div><label class="block text-sm font-medium text-slate-600 mb-1">Value (USD)</label><input type="number" step="0.01" name="items[' + i + '].value" value="' + (val !== '' ? val : '') + '" class="w-full rounded-lg border border-slate-300 px-3 py-2" placeholder="0.00"></div>' +
              '<div><label class="block text-sm font-medium text-slate-600 mb-1">Quantity</label><input type="number" min="1" name="items[' + i + '].quantity" value="' + (qty !== '' ? qty : '') + '" class="w-full rounded-lg border border-slate-300 px-3 py-2" placeholder="1"></div>' +
              '<div><label class="block text-sm font-medium text-slate-600 mb-1">HS Code</label><input type="text" name="items[' + i + '].hs_code" value="' + (hs || '').replace(/"/g, '&quot;') + '" class="w-full rounded-lg border border-slate-300 px-3 py-2" placeholder="e.g. 6109.10"></div>' +
              '<div><label class="block text-sm font-medium text-slate-600 mb-1">Country of origin</label><input type="text" name="items[' + i + '].country_of_origin" value="' + (origin || '').replace(/"/g, '&quot;') + '" class="w-full rounded-lg border border-slate-300 px-3 py-2" placeholder="e.g. US"></div>' +
              '<div><label class="block text-sm font-medium text-slate-600 mb-1">Weight (lbs)</label><input type="number" step="0.01" name="items[' + i + '].weight_lbs" value="' + (w !== '' ? w : '') + '" class="w-full rounded-lg border border-slate-300 px-3 py-2" placeholder="0.00"></div>' +
              '</div></div>';
          });
          formHtml += '<div class="flex gap-3"><button type="submit" id="submit-btn" class="bg-[#2563EB] text-white px-6 py-2 rounded-lg font-medium">Submit customs</button></div></form></main></div>';
          document.getElementById('app').innerHTML = sidebar(user, 'ship-requests') + formHtml;
          document.getElementById('logout-btn').onclick = () => { fetch('/api/v1/auth/logout', { method: 'POST', credentials: 'include' }).then(() => { localStorage.removeItem('qcs_access_token'); window.location.href = '/'; }); };
          document.getElementById('customs-form').onsubmit = function(e) {
            e.preventDefault();
            const form = e.target;
            const payload = [];
            for (let i = 0; i < items.length; i++) {
              const idInput = form.querySelector('input[name="items[' + i + '].id"]');
              const descInput = form.querySelector('input[name="items[' + i + '].description"]');
              const valInput = form.querySelector('input[name="items[' + i + '].value"]');
              const qtyInput = form.querySelector('input[name="items[' + i + '].quantity"]');
              const hsInput = form.querySelector('input[name="items[' + i + '].hs_code"]');
              const originInput = form.querySelector('input[name="items[' + i + '].country_of_origin"]');
              const wInput = form.querySelector('input[name="items[' + i + '].weight_lbs"]');
              const o = { id: (idInput && idInput.value) || items[i].id };
              o.description = descInput ? descInput.value.trim() : '';
              o.value = valInput && valInput.value !== '' ? parseFloat(valInput.value) : null;
              o.quantity = qtyInput && qtyInput.value !== '' ? parseInt(qtyInput.value, 10) : null;
              o.hs_code = hsInput ? hsInput.value.trim() : '';
              o.country_of_origin = originInput ? originInput.value.trim() : '';
              o.weight_lbs = wInput && wInput.value !== '' ? parseFloat(wInput.value) : null;
              payload.push(o);
            }
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = 'Submitting…';
            fetch('/api/v1/ship-requests/' + id + '/customs', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
              body: JSON.stringify(payload)
            }).then(r => {
              if (r.ok) window.location.href = '/dashboard/ship-requests/' + id;
              else return r.json().then(j => Promise.reject(j));
            }).catch(err => {
              btn.disabled = false;
              btn.textContent = 'Submit customs';
              alert(err.message || err.code || 'Failed to submit customs');
            });
          };
        });
      });
    })();
  </script>
  <script src="/dashboard/mobile-nav.js"></script>
</body>
</html>
