<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customs Declaration | QCS Cargo</title>
  <script src="https://cdn.tailwindcss.com" defer></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/dashboard/pwa-shell.css" />
  <link rel="stylesheet" href="/dashboard/mobile-nav.css" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2 { font-family: 'Plus Jakarta Sans', sans-serif; }
  </style>
</head>

<body class="bg-[#F8FAFC] text-[#0F172A] min-h-screen">
  <a href="#qcs-main" class="qcs-skip-link">Skip to main content</a>
  <div id="dashboard-app"></div>
  <script src="/dashboard/pwa-shell.js"></script>
  <script>
    (function () {
      'use strict';
      var QCS = window.QCSPWA;
      QCS.initBase({ registerSW: true, keyboard: true, utilityDock: true });

      var loginRedirect = '/login?redirect=' + encodeURIComponent(window.location.pathname);
      var token = QCS.readToken();
      if (!token) { window.location.href = loginRedirect; return; }

      var pathParts = window.location.pathname.split('/').filter(Boolean);
      var idx = pathParts.indexOf('ship-requests');
      var id = idx >= 0 && pathParts[idx + 1] && pathParts[idx + 1] !== 'customs' ? pathParts[idx + 1] : null;
      if (!id) { window.location.href = '/dashboard/ship-requests'; return; }

      var app = document.getElementById('dashboard-app');
      QCS.mountLoading(app, QCS.t('loading'));

      Promise.all([
        QCS.fetchJson('/api/v1/me'),
        QCS.fetchJson('/api/v1/ship-requests/' + encodeURIComponent(id))
      ]).then(function (results) {
        var me = results[0];
        if (!me || !me.data) { window.location.href = loginRedirect; return; }
        if (!results[1] || !results[1].data) {
          QCS.mountError(app, {
            title: 'Ship request not found',
            actionLabel: 'Back to ship requests',
            onRetry: function () { window.location.href = '/dashboard/ship-requests'; }
          });
          return;
        }
        var sr = results[1].data.ship_request || results[1].data;
        var items = results[1].data.items || [];
        var status = (sr.status || '').toLowerCase();
        if (status !== 'draft' && status !== 'pending_customs') {
          renderLockedShell(sr);
          QCS.bindLogout();
          return;
        }
        renderShell(sr, items);
        QCS.bindLogout();
        bindForm(items);
      }).catch(function (err) {
        QCS.mountError(app, {
          title: 'Unable to load customs form',
          description: (err && err.message) || 'Network error.',
          actionLabel: 'Sign in again',
          onRetry: function () { window.location.href = loginRedirect; }
        });
      });

      function str(v) { return typeof v === 'string' ? v : (v && v.String) != null ? v.String : ''; }
      function num(v) {
        if (typeof v === 'number' && !isNaN(v)) return v;
        if (v && v.Valid && v.Float64 != null) return v.Float64;
        if (v && v.Valid && v.Int64 != null) return v.Int64;
        return '';
      }

      function renderLockedShell(sr) {
        var sidebar = QCS.renderSidebar('ship-requests');
        var html = '<div class="qcs-page-wrap">' + sidebar
          + '<main id="qcs-main" class="qcs-page-main" tabindex="-1">'
          + '<nav aria-label="Breadcrumb" class="mb-4"><ol class="flex items-center gap-2 text-sm text-slate-600">'
          + '<li><a href="/dashboard" class="text-[#2563EB] hover:underline">Dashboard</a></li>'
          + '<li aria-hidden="true">/</li>'
          + '<li><a href="/dashboard/ship-requests" class="text-[#2563EB] hover:underline">Ship Requests</a></li>'
          + '<li aria-hidden="true">/</li>'
          + '<li class="text-[#0F172A] font-medium" aria-current="page">Customs</li></ol></nav>'
          + '<h1 class="text-3xl font-bold text-[#0F172A] mb-2">Customs declaration</h1>'
          + '<div class="bg-amber-50 border border-amber-200 rounded-xl p-6 text-amber-900">'
          + '<p class="font-semibold mb-1">Customs already submitted</p>'
          + '<p class="text-sm">Customs can only be edited while the request is in draft or pending customs.</p>'
          + '<a href="/dashboard/ship-requests/' + encodeURIComponent(id) + '" class="inline-block mt-3 text-[#2563EB] underline font-medium">Back to ship request →</a>'
          + '</div></main></div>';
        app.innerHTML = html;
        var main = document.getElementById('qcs-main');
        if (main) main.focus({ preventScroll: true });
      }

      function renderShell(sr, items) {
        var sidebar = QCS.renderSidebar('ship-requests');
        var formItems = items.map(function (it, i) { return itemCard(it, i); }).join('');
        if (!items.length) formItems = '<p class="text-slate-600">This ship request has no items to declare.</p>';
        var html = '<div class="qcs-page-wrap">' + sidebar
          + '<main id="qcs-main" class="qcs-page-main" tabindex="-1">'
          + '<nav aria-label="Breadcrumb" class="mb-4"><ol class="flex items-center gap-2 text-sm text-slate-600">'
          + '<li><a href="/dashboard" class="text-[#2563EB] hover:underline">Dashboard</a></li>'
          + '<li aria-hidden="true">/</li>'
          + '<li><a href="/dashboard/ship-requests" class="text-[#2563EB] hover:underline">Ship Requests</a></li>'
          + '<li aria-hidden="true">/</li>'
          + '<li><a href="/dashboard/ship-requests/' + encodeURIComponent(id) + '" class="text-[#2563EB] hover:underline">' + window.qcsEscapeHTML(sr.confirmation_code || id) + '</a></li>'
          + '<li aria-hidden="true">/</li>'
          + '<li class="text-[#0F172A] font-medium" aria-current="page">Customs</li></ol></nav>'
          + '<h1 class="text-3xl font-bold text-[#0F172A] mb-1">Customs declaration</h1>'
          + '<p class="text-slate-500 mb-6">' + window.qcsEscapeHTML(sr.confirmation_code || id) + '</p>'
          + '<form id="customs-form" class="space-y-5">'
          + formItems
          + '<div class="flex flex-wrap items-center gap-3 pt-3 border-t border-slate-100">'
          + '<button type="submit" id="submit-btn" class="bg-[#2563EB] text-white px-6 py-2 rounded-lg font-semibold shadow-sm hover:opacity-95">Submit customs</button>'
          + '<a href="/dashboard/ship-requests/' + encodeURIComponent(id) + '" class="text-[#2563EB] hover:underline">Cancel</a>'
          + '<p id="customs-msg" class="text-sm hidden" aria-live="polite"></p>'
          + '</div>'
          + '</form></main></div>';
        app.innerHTML = html;
        var main = document.getElementById('qcs-main');
        if (main) main.focus({ preventScroll: true });
      }

      function itemCard(it, i) {
        var desc = str(it.customs_description);
        var v = num(it.customs_value);
        var qty = it.customs_quantity != null && it.customs_quantity.Valid ? it.customs_quantity.Int64 : (typeof it.customs_quantity === 'number' ? it.customs_quantity : '');
        var hs = str(it.customs_hs_code);
        var origin = str(it.customs_country_of_origin);
        var w = num(it.customs_weight_lbs);
        var pkgRef = (it.locker_package_id || it.id || '').slice(0, 8);
        return '<section class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">'
          + '<h2 class="text-lg font-semibold text-[#0F172A] mb-4">Item ' + (i + 1) + ' <span class="text-sm text-slate-500 font-normal">Package ' + window.qcsEscapeHTML(pkgRef) + '…</span></h2>'
          + '<input type="hidden" name="items[' + i + '].id" value="' + window.qcsEscapeHTML(it.id || '') + '">'
          + '<div class="grid gap-4 md:grid-cols-2">'
          + textField(i, 'description', 'Description', 'text', desc, 'e.g. Clothing')
          + textField(i, 'value', 'Value (USD)', 'number', v, '0.00', '0.01')
          + textField(i, 'quantity', 'Quantity', 'number', qty, '1', '1', '1')
          + textField(i, 'hs_code', 'HS Code', 'text', hs, 'e.g. 6109.10')
          + textField(i, 'country_of_origin', 'Country of origin', 'text', origin, 'e.g. US')
          + textField(i, 'weight_lbs', 'Weight (lbs)', 'number', w, '0.00', '0.01')
          + '</div></section>';
      }

      function textField(i, name, label, type, value, placeholder, step, min) {
        var attrs = 'type="' + type + '" name="items[' + i + '].' + name + '"';
        if (value !== '' && value != null) attrs += ' value="' + window.qcsEscapeHTML(String(value)) + '"';
        if (placeholder) attrs += ' placeholder="' + window.qcsEscapeHTML(placeholder) + '"';
        if (step) attrs += ' step="' + step + '"';
        if (min) attrs += ' min="' + min + '"';
        return '<div>'
          + '<label class="block text-sm font-medium text-slate-700 mb-1">' + window.qcsEscapeHTML(label) + '</label>'
          + '<input ' + attrs + ' class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#2563EB]">'
          + '</div>';
      }

      function bindForm(items) {
        var form = document.getElementById('customs-form');
        if (!form) return;
        form.addEventListener('submit', function (e) {
          e.preventDefault();
          var payload = [];
          for (var i = 0; i < items.length; i++) {
            var idInput = form.querySelector('input[name="items[' + i + '].id"]');
            var descInput = form.querySelector('input[name="items[' + i + '].description"]');
            var valInput = form.querySelector('input[name="items[' + i + '].value"]');
            var qtyInput = form.querySelector('input[name="items[' + i + '].quantity"]');
            var hsInput = form.querySelector('input[name="items[' + i + '].hs_code"]');
            var originInput = form.querySelector('input[name="items[' + i + '].country_of_origin"]');
            var wInput = form.querySelector('input[name="items[' + i + '].weight_lbs"]');
            payload.push({
              id: (idInput && idInput.value) || items[i].id,
              description: descInput ? descInput.value.trim() : '',
              value: valInput && valInput.value !== '' ? parseFloat(valInput.value) : null,
              quantity: qtyInput && qtyInput.value !== '' ? parseInt(qtyInput.value, 10) : null,
              hs_code: hsInput ? hsInput.value.trim() : '',
              country_of_origin: originInput ? originInput.value.trim() : '',
              weight_lbs: wInput && wInput.value !== '' ? parseFloat(wInput.value) : null
            });
          }
          var btn = document.getElementById('submit-btn');
          btn.disabled = true;
          var origLabel = btn.textContent;
          btn.textContent = 'Submitting…';
          QCS.fetchJson('/api/v1/ship-requests/' + encodeURIComponent(id) + '/customs', { method: 'POST', body: payload })
            .then(function () {
              QCS.toast('Customs submitted', 'success');
              window.location.href = '/dashboard/ship-requests/' + encodeURIComponent(id);
            })
            .catch(function (err) {
              btn.disabled = false;
              btn.textContent = origLabel;
              var msg = document.getElementById('customs-msg');
              if (msg) {
                msg.textContent = (err && err.message) || 'Failed to submit customs.';
                msg.className = 'text-sm text-red-600';
                msg.classList.remove('hidden');
              }
            });
        });
      }
    })();
  </script>
  <script src="/dashboard/mobile-nav.js"></script>
</body>

</html>
