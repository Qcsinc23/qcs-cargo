<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookings | QCS Cargo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>body{font-family:'Inter',sans-serif}h1,h2{font-family:'Plus Jakarta Sans',sans-serif}</style>
</head>
<body class="bg-[#F8FAFC] text-[#0F172A] min-h-screen">
  <div id="app">Loading…</div>
  <script>
    (function() {
      const token = localStorage.getItem('qcs_access_token');
      if (!token) { window.location.href = '/login?redirect=' + encodeURIComponent('/dashboard/bookings'); return; }
      const auth = { headers: { 'Authorization': 'Bearer ' + token } };

      function sidebar(user, active) {
        const suiteCode = (user && user.suite_code) || '—';
        return '<div class="flex min-h-screen"><aside class="w-64 bg-[#0F172A] text-white py-6 px-4">' +
          '<a href="/" class="font-bold text-lg block mb-8">QCS Cargo</a>' +
          '<nav class="space-y-1">' +
          '<a href="/dashboard" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Dashboard</a>' +
          '<a href="/dashboard/inbox" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">My Packages</a>' +
          '<a href="/dashboard/mailbox" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">My Mailbox</a>' +
          '<a href="/dashboard/inbound" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Expected Packages</a>' +
          '<a href="/dashboard/ship-requests" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Ship Requests</a>' +
          '<a href="/dashboard/bookings" class="block py-2 px-3 rounded-lg ' + (active === 'bookings' ? 'bg-[#1E293B]' : 'hover:bg-[#1E293B]') + '">Bookings</a>' +
          '<a href="/dashboard/recipients" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Recipients</a>' +
          '</nav><p class="mt-8 text-slate-400 text-sm">Suite: ' + suiteCode + '</p>' +
          '<button type="button" id="logout-btn" class="mt-4 text-sm text-slate-400 hover:text-white">Sign out</button></aside>';
      }

      Promise.all([
        fetch('/api/v1/me', auth).then(r => r.ok ? r.json() : null),
        fetch('/api/v1/bookings', auth).then(r => r.ok ? r.json() : null)
      ]).then(([me, res]) => {
        if (!me) { window.location.href = '/login'; return; }
        const user = me.data;
        const list = (res && res.data) || [];
        let main = '<main class="flex-1 p-8">' +
          '<nav aria-label="Breadcrumb" class="mb-4"><ol class="flex items-center gap-2 text-sm text-slate-600"><li><a href="/dashboard" class="text-[#2563EB] hover:underline">Dashboard</a></li><li aria-hidden="true">/</li><li class="text-[#0F172A] font-medium" aria-current="page">Bookings</li></ol></nav>' +
          '<h1 class="text-3xl font-bold text-[#0F172A] mb-2">Bookings</h1>' +
          '<p class="text-slate-600 mb-6">' + list.length + ' booking(s)</p>' +
          '<a href="/dashboard/bookings/new" class="inline-block bg-[#F97316] text-white px-6 py-2 rounded-lg font-medium mb-6">New booking</a>';
        if (list.length === 0) {
          main += '<div class="bg-white rounded-xl border border-slate-200 p-12 text-center">' +
            '<p class="text-slate-600 mb-4">No bookings yet.</p>' +
            '<a href="/dashboard/bookings/new" class="text-[#2563EB] font-medium">Create your first booking</a></div>';
        } else {
          main += '<div class="bg-white rounded-xl border border-slate-200 overflow-hidden">' +
            '<table class="w-full"><thead class="bg-slate-50 border-b border-slate-200"><tr>' +
            '<th class="text-left py-3 px-4 font-medium text-slate-600">Code</th>' +
            '<th class="text-left py-3 px-4 font-medium text-slate-600">Status</th>' +
            '<th class="text-left py-3 px-4 font-medium text-slate-600">Date</th>' +
            '<th class="text-left py-3 px-4 font-medium text-slate-600">Time</th>' +
            '<th class="text-left py-3 px-4 font-medium text-slate-600">Destination</th>' +
            '<th class="text-left py-3 px-4 font-medium text-slate-600"></th></tr></thead><tbody>';
          list.forEach(b => {
            const code = b.confirmation_code || b.id;
            const status = b.status || 'pending';
            const statusClass = status === 'confirmed' ? 'bg-emerald-100 text-emerald-800' : status === 'cancelled' ? 'bg-slate-100 text-slate-600' : 'bg-amber-100 text-amber-800';
            main += '<tr class="border-b border-slate-100 hover:bg-slate-50">' +
              '<td class="py-3 px-4 font-mono text-sm">' + code + '</td>' +
              '<td class="py-3 px-4"><span class="px-2 py-1 rounded text-sm ' + statusClass + '">' + status + '</span></td>' +
              '<td class="py-3 px-4">' + (b.scheduled_date || '—') + '</td>' +
              '<td class="py-3 px-4">' + (b.time_slot || '—') + '</td>' +
              '<td class="py-3 px-4">' + (b.destination_id || '—') + '</td>' +
              '<td class="py-3 px-4"><a href="/dashboard/bookings/' + b.id + '" class="text-[#2563EB] font-medium">View</a></td></tr>';
          });
          main += '</tbody></table></div>';
        }
        main += '</main></div>';
        document.getElementById('app').innerHTML = sidebar(user, 'bookings') + main;
        document.getElementById('logout-btn').onclick = () => {
          fetch('/api/v1/auth/logout', { method: 'POST', credentials: 'include' }).then(() => { localStorage.removeItem('qcs_access_token'); window.location.href = '/'; });
        };
      });
    })();
  </script>
</body>
</html>
