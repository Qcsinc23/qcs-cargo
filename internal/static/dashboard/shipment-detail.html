<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shipment Details | QCS Cargo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>body{font-family:'Inter',sans-serif}h1,h2{font-family:'Plus Jakarta Sans',sans-serif}</style>
  <link rel="stylesheet" href="/dashboard/mobile-nav.css" />
</head>
<body class="bg-[#F8FAFC] text-[#0F172A] min-h-screen">
  <div id="app">Loading…</div>
  <script>
    (function() {
      const token = localStorage.getItem('qcs_access_token');
      if (!token) { window.location.href = '/login'; return; }
      const pathParts = window.location.pathname.split('/');
      const id = pathParts[pathParts.length - 1];
      if (!id || id === 'shipments') { window.location.href = '/dashboard/shipments'; return; }
      const auth = { headers: { 'Authorization': 'Bearer ' + token } };

      function sidebar(user, active) {
        const suiteCode = (user && user.suite_code) || '—';
        return '<div class="flex min-h-screen"><aside class="w-64 bg-[#0F172A] text-white py-6 px-4">' +
          '<a href="/" class="font-bold text-lg block mb-8">QCS Cargo</a>' +
          '<nav class="space-y-1">' +
          '<a href="/dashboard" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Dashboard</a>' +
          '<a href="/dashboard/inbox" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">My Packages</a>' +
          '<a href="/dashboard/ship" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Ship My Packages</a>' +
          '<a href="/dashboard/ship-requests" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Ship Requests</a>' +
          '<a href="/dashboard/recipients" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Recipients</a>' +
          '<a href="/dashboard/shipments" class="block py-2 px-3 rounded-lg ' + (active === 'shipments' ? 'bg-[#1E293B]' : 'hover:bg-[#1E293B]') + '">Shipments</a>' +
          '<a href="/dashboard/invoices" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Invoices</a>' +
          '<a href="/dashboard/templates" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Templates</a>' +
          '<a href="/dashboard/profile" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Profile</a>' +
          '<a href="/dashboard/settings" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Settings</a>' +
          '</nav><p class="mt-8 text-slate-400 text-sm">Suite: ' + suiteCode + '</p>' +
          '<button type="button" id="logout-btn" class="mt-4 text-sm text-slate-400 hover:text-white">Sign out</button></aside>';
      }

      fetch('/api/v1/me', auth).then(r => r.ok ? r.json() : null).then(me => {
        if (!me) { window.location.href = '/login'; return; }
        const user = me.data;
        fetch('/api/v1/shipments/' + id, auth).then(r => r.ok ? r.json() : null).then(res => {
          if (!res || !res.data) {
            document.getElementById('app').innerHTML = '<div class="p-8"><p>Shipment not found.</p><a href="/dashboard/shipments" class="text-[#2563EB]">Back to list</a></div>';
            return;
          }
          const s = res.data;
          const bcCode = (s.tracking_number || s.id || 'Detail');
          let main = '<main class="flex-1 p-8">' +
            '<nav aria-label="Breadcrumb" class="mb-4"><ol class="flex items-center gap-2 text-sm text-slate-600"><li><a href="/dashboard" class="text-[#2563EB] hover:underline">Dashboard</a></li><li aria-hidden="true">/</li><li><a href="/dashboard/shipments" class="text-[#2563EB] hover:underline">Shipments</a></li><li aria-hidden="true">/</li><li class="text-[#0F172A] font-medium" aria-current="page">' + bcCode + '</li></ol></nav>' +
            '<a href="/dashboard/shipments" class="text-[#2563EB] mb-6 inline-block">← Back to shipments</a>' +
            '<h1 class="text-3xl font-bold text-[#0F172A] mb-1">Shipment</h1>' +
            '<p class="text-slate-500 mb-6">' + (s.status || '—') + ' · ' + (s.destination_id || '') + '</p>' +
            '<div class="bg-white rounded-xl border border-slate-200 p-6 mb-6">' +
            '<p><strong>Tracking:</strong> ' + (s.tracking_number || s.id || '—') + '</p>' +
            '<p class="mt-2"><strong>Status:</strong> ' + (s.status || '—') + '</p>' +
            '<p class="mt-2"><strong>Destination:</strong> ' + (s.destination_id || '—') + '</p>' +
            (s.carrier ? '<p class="mt-2"><strong>Carrier:</strong> ' + s.carrier + '</p>' : '') +
            (s.estimated_delivery ? '<p class="mt-2"><strong>Est. delivery:</strong> ' + s.estimated_delivery + '</p>' : '') +
            (s.actual_delivery ? '<p class="mt-2"><strong>Delivered:</strong> ' + s.actual_delivery + '</p>' : '') +
            '<p class="mt-2"><strong>Created:</strong> ' + (s.created_at || '—') + '</p>' +
            '</div></main></div>';
          document.getElementById('app').innerHTML = sidebar(user, 'shipments') + main;
          document.getElementById('logout-btn').onclick = () => {
            fetch('/api/v1/auth/logout', { method: 'POST', credentials: 'include' }).then(() => { localStorage.removeItem('qcs_access_token'); window.location.href = '/'; });
          };
        });
      });
    })();
  </script>
  <script src="/dashboard/mobile-nav.js"></script>
</body>
</html>
