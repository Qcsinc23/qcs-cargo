<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Package Details | QCS Cargo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>body{font-family:'Inter',sans-serif}h1,h2{font-family:'Plus Jakarta Sans',sans-serif}</style>
</head>
<body class="bg-[#F8FAFC] text-[#0F172A] min-h-screen">
  <div id="app">Loading…</div>
  <script>
    (function() {
      const token = localStorage.getItem('qcs_access_token');
      if (!token) { window.location.href = '/login'; return; }
      const pathParts = window.location.pathname.split('/');
      const id = pathParts[pathParts.length - 1];
      if (!id || id === 'inbox') { window.location.href = '/dashboard/inbox'; return; }
      const auth = { headers: { 'Authorization': 'Bearer ' + token } };
      Promise.all([
        fetch('/api/v1/me', auth).then(r => r.ok ? r.json() : null),
        fetch('/api/v1/locker/' + id, auth).then(r => r.ok ? r.json() : null)
      ]).then(([me, pkg]) => {
        if (!me) { window.location.href = '/login'; return; }
        if (!pkg || !pkg.data) { document.getElementById('app').innerHTML = '<div class="p-8"><p>Package not found.</p><a href="/dashboard/inbox" class="text-[#2563EB]">Back to inbox</a></div>'; return; }
        const p = pkg.data;
        const user = me.data;
        const suiteCode = user.suite_code || '—';
        const sidebar = '<div class="flex min-h-screen"><aside class="w-64 bg-[#0F172A] text-white py-6 px-4">' +
          '<a href="/" class="font-bold text-lg block mb-8">QCS Cargo</a><nav class="space-y-1">' +
          '<a href="/dashboard" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Dashboard</a>' +
          '<a href="/dashboard/inbox" class="block py-2 px-3 rounded-lg bg-[#1E293B]">My Packages</a>' +
          '<a href="/dashboard/mailbox" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">My Mailbox</a>' +
          '</nav><p class="mt-8 text-slate-400 text-sm">Suite: ' + suiteCode + '</p>' +
          '<button type="button" id="logout-btn" class="mt-4 text-sm text-slate-400 hover:text-white">Sign out</button></aside>';
        const sender = typeof p.sender_name === 'string' ? p.sender_name : (p.sender_name && p.sender_name.String) || '—';
        const weight = typeof p.weight_lbs === 'number' ? p.weight_lbs : (p.weight_lbs && p.weight_lbs.Float64) || '—';
        const main = '<main class="flex-1 p-8">' +
          '<nav aria-label="Breadcrumb" class="mb-4"><ol class="flex items-center gap-2 text-sm text-slate-600"><li><a href="/dashboard" class="text-[#2563EB] hover:underline">Dashboard</a></li><li aria-hidden="true">/</li><li><a href="/dashboard/inbox" class="text-[#2563EB] hover:underline">My Packages</a></li><li aria-hidden="true">/</li><li class="text-[#0F172A] font-medium" aria-current="page">Package</li></ol></nav>' +
          '<a href="/dashboard/inbox" class="text-[#2563EB] mb-6 inline-block">← Back to inbox</a>' +
          '<h1 class="text-3xl font-bold text-[#0F172A] mb-2">' + sender + '</h1>' +
          '<p class="text-slate-500 mb-6">' + (p.status || 'stored') + ' · arrived ' + (p.arrived_at || '—') + '</p>' +
          '<div class="bg-white rounded-xl border border-slate-200 p-6 mb-6">' +
          '<p><strong>Weight:</strong> ' + weight + ' lbs</p>' +
          '<p class="mt-2"><strong>Condition:</strong> ' + (p.condition || '—') + '</p>' +
          '</div>' +
          '<div class="flex flex-wrap gap-3 mb-4">' +
          '<a href="/dashboard/ship?packages=' + p.id + '" class="inline-block bg-[#F97316] text-white px-6 py-2 rounded-lg font-medium">Ship This Package</a>' +
          '<button type="button" id="photo-request-btn" class="bg-white border border-slate-200 px-6 py-2 rounded-lg font-medium">Request Photo</button>' +
          '<button type="button" id="service-request-btn" class="bg-white border border-slate-200 px-6 py-2 rounded-lg font-medium">Request Service</button>' +
          '</div>' +
          '<p id="request-msg" class="text-sm text-slate-500 hidden"></p>' +
          '</main></div>';
        document.getElementById('app').innerHTML = sidebar + main;
        document.getElementById('logout-btn').onclick = () => {
          fetch('/api/v1/auth/logout', { method: 'POST', credentials: 'include' }).then(() => { localStorage.removeItem('qcs_access_token'); window.location.href = '/'; });
        };
        const msgEl = document.getElementById('request-msg');
        function showMsg(text, isErr) {
          msgEl.textContent = text;
          msgEl.className = 'text-sm ' + (isErr ? 'text-red-600' : 'text-slate-500');
          msgEl.classList.remove('hidden');
        }
        document.getElementById('photo-request-btn').onclick = () => {
          fetch('/api/v1/locker/' + p.id + '/photo-request', { method: 'POST', ...auth }).then(r => r.json()).then(d => {
            if (d.status === 'success') showMsg('Photo request submitted.');
            else showMsg(d.message || 'Request failed.', true);
          }).catch(() => showMsg('Request failed.', true));
        };
        document.getElementById('service-request-btn').onclick = () => {
          const type = prompt('Service type (e.g. repack, inspect, consolidate):', 'inspect') || 'inspect';
          fetch('/api/v1/locker/' + p.id + '/service-request', {
            method: 'POST',
            ...auth,
            headers: { ...auth.headers, 'Content-Type': 'application/json' },
            body: JSON.stringify({ service_type: type, notes: '' })
          }).then(r => r.json()).then(d => {
            if (d.status === 'success') showMsg('Service request submitted.');
            else showMsg(d.message || 'Request failed.', true);
          }).catch(() => showMsg('Request failed.', true));
        };
      });
    })();
  </script>
</body>
</html>
