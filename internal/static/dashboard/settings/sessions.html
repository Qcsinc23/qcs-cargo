<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sessions | QCS Cargo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>body{font-family:'Inter',sans-serif}h1,h2{font-family:'Plus Jakarta Sans',sans-serif}</style>
  <link rel="stylesheet" href="/dashboard/mobile-nav.css" />
</head>
<body class="bg-[#F8FAFC] text-[#0F172A] min-h-screen">
  <div id="app">Loading…</div>
  <script>
    (function() {
      const token = localStorage.getItem('qcs_access_token');
      if (!token) { window.location.href = '/login?redirect=' + encodeURIComponent('/dashboard/settings/sessions'); return; }
      const auth = { headers: { 'Authorization': 'Bearer ' + token } };

      function sidebar(user, active) {
        const suiteCode = (user && user.suite_code) || '—';
        return '<div class="flex min-h-screen"><aside class="w-64 bg-[#0F172A] text-white py-6 px-4">' +
          '<a href="/" class="font-bold text-lg block mb-8">QCS Cargo</a>' +
          '<nav class="space-y-1">' +
          '<a href="/dashboard/profile" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Profile</a>' +
          '<a href="/dashboard/settings" class="block py-2 px-3 rounded-lg ' + (active === 'settings' ? 'bg-[#1E293B]' : 'hover:bg-[#1E293B]') + '">Settings</a>' +
          '</nav><p class="mt-8 text-slate-400 text-sm">Suite: ' + suiteCode + '</p>' +
          '<button type="button" id="logout-btn" class="mt-4 text-sm text-slate-400 hover:text-white">Sign out</button></aside>';
      }

      fetch('/api/v1/me', auth).then(r => r.ok ? r.json() : null).then(me => {
        if (!me) { window.location.href = '/login'; return; }
        const user = me.data;
        fetch('/api/v1/sessions', auth).then(r => r.ok ? r.json() : null).then(res => {
          const list = (res && res.data) || [];
          let main = '<main class="flex-1 p-8">' +
            '<nav aria-label="Breadcrumb" class="mb-4"><ol class="flex items-center gap-2 text-sm text-slate-600"><li><a href="/dashboard" class="text-[#2563EB] hover:underline">Dashboard</a></li><li aria-hidden="true">/</li><li><a href="/dashboard/settings" class="text-[#2563EB] hover:underline">Settings</a></li><li aria-hidden="true">/</li><li class="text-[#0F172A] font-medium" aria-current="page">Sessions</li></ol></nav>' +
            '<a href="/dashboard/settings" class="text-[#2563EB] mb-6 inline-block">← Settings</a>' +
            '<h1 class="text-3xl font-bold text-[#0F172A] mb-2">Active sessions</h1>' +
            '<p class="text-slate-600 mb-6">Revoke a session to sign that device out. Revoke all others to keep only this browser.</p>' +
            '<button type="button" id="revoke-all-btn" class="mb-6 bg-slate-200 text-slate-800 px-4 py-2 rounded-lg font-medium hover:bg-slate-300">Revoke all other sessions</button>' +
            '<div class="bg-white rounded-xl border border-slate-200 overflow-hidden">' +
            '<table class="w-full"><thead class="bg-slate-50 border-b border-slate-200"><tr>' +
            '<th class="text-left py-3 px-4 font-medium text-slate-600">Device / IP</th>' +
            '<th class="text-left py-3 px-4 font-medium text-slate-600">Created</th>' +
            '<th class="text-left py-3 px-4 font-medium text-slate-600">Expires</th>' +
            '<th class="text-left py-3 px-4 font-medium text-slate-600"></th></tr></thead><tbody>';
          list.forEach(s => {
            main += '<tr class="border-b border-slate-100 hover:bg-slate-50">' +
              '<td class="py-3 px-4">' + (s.user_agent || s.ip_address || s.id.slice(0,8)) + '</td>' +
              '<td class="py-3 px-4 text-slate-500 text-sm">' + (s.created_at || '—') + '</td>' +
              '<td class="py-3 px-4 text-slate-500 text-sm">' + (s.expires_at || '—') + '</td>' +
              '<td class="py-3 px-4"><button type="button" class="text-red-600 hover:text-red-800 text-sm revoke-one" data-id="' + s.id + '">Revoke</button></td></tr>';
          });
          main += '</tbody></table></div></main></div>';
          document.getElementById('app').innerHTML = sidebar(user, 'settings') + main;
          document.getElementById('logout-btn').onclick = () => {
            fetch('/api/v1/auth/logout', { method: 'POST', credentials: 'include' }).then(() => { localStorage.removeItem('qcs_access_token'); window.location.href = '/'; });
          };
          document.getElementById('revoke-all-btn').onclick = function() {
            if (!confirm('Sign out all other devices? You will stay signed in on this browser.')) return;
            fetch('/api/v1/sessions', { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }, body: JSON.stringify({}) })
              .then(r => { if (r.status === 204) location.reload(); });
          };
          document.querySelectorAll('.revoke-one').forEach(btn => {
            btn.onclick = function() {
              const sid = this.getAttribute('data-id');
              if (!confirm('Revoke this session?')) return;
              fetch('/api/v1/sessions/' + sid, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } })
                .then(r => { if (r.status === 204) location.reload(); });
            };
          });
        });
      });
    })();
  </script>
  <script src="/dashboard/mobile-nav.js"></script>
</body>
</html>
