<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | QCS Cargo</title>
  <script src="https://cdn.tailwindcss.com" defer></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/dashboard/pwa-shell.css" />
  <link rel="stylesheet" href="/dashboard/mobile-nav.css" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2 { font-family: 'Plus Jakarta Sans', sans-serif; }
  </style>
</head>

<body class="bg-[#F8FAFC] text-[#0F172A] min-h-screen">
  <a href="#qcs-main" class="qcs-skip-link">Skip to main content</a>
  <div id="dashboard-app"></div>
  <script src="/dashboard/pwa-shell.js"></script>
  <script>
    (function () {
      'use strict';
      var QCS = window.QCSPWA;
      QCS.initBase({ registerSW: true, keyboard: true, utilityDock: true });

      var loginRedirect = '/login?redirect=' + encodeURIComponent('/dashboard');
      var token = QCS.readToken();
      if (!token) { window.location.href = loginRedirect; return; }

      var app = document.getElementById('dashboard-app');
      QCS.mountLoading(app, QCS.t('loading_dashboard'));

      var streamHandle = null;

      // Bootstrap: /me first, then concurrently fetch all stats. We run the
      // stats fetches in parallel and tolerate per-card failure (they fall
      // back to "—").
      QCS.fetchJson('/api/v1/me')
        .then(function (j) {
          if (!j || !j.data) { window.location.href = loginRedirect; return; }
          var user = j.data;
          renderShell(user);
          attachLogoutAndStream();
          loadStats();
        })
        .catch(function (err) {
          QCS.mountError(app, {
            title: 'Unable to load dashboard',
            description: (err && err.message) || 'Network error.',
            actionLabel: 'Sign in again',
            onRetry: function () { window.location.href = loginRedirect; }
          });
        });

      function renderShell(user) {
        var sidebar = QCS.renderSidebar('dashboard');
        var firstName = (user.name || '').split(' ')[0] || 'there';
        var html = '<div class="qcs-page-wrap">' + sidebar
          + '<main id="qcs-main" class="qcs-page-main" tabindex="-1">'
          + '<div class="flex flex-wrap items-end justify-between gap-3 mb-6">'
          + '<div>'
          + '<p class="text-sm text-slate-500">Welcome back,</p>'
          + '<h1 class="text-3xl font-bold">' + window.qcsEscapeHTML(firstName) + '</h1>'
          + '</div>'
          + '<p id="dashboard-stream-status" class="text-xs text-slate-500" aria-live="polite">Realtime updates connecting…</p>'
          + '</div>'
          + '<div id="dashboard-banner"></div>'
          + '<section aria-label="Account stats" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">'
          + statCard('stat-locker', 'Packages in locker', '/dashboard/inbox', '📦', 'View packages')
          + statCard('stat-inbound', 'Expected arrivals', '/dashboard/inbound', '🛬', 'Pre-alert')
          + statCard('stat-pending', 'Pending ship requests', '/dashboard/ship-requests', '📤', 'Open requests')
          + statCard('stat-shipped', 'Shipments in flight', '/dashboard/shipments', '🚚', 'Track shipments')
          + '</section>'
          + '<section class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm mb-6 flex flex-wrap items-center justify-between gap-4">'
          + '<div>'
          + '<h2 class="text-xl font-bold mb-1">Ready to ship?</h2>'
          + '<p class="text-slate-600">Create a ship request from your stored packages in under a minute.</p>'
          + '</div>'
          + '<div class="flex gap-2 flex-wrap">'
          + '<a href="/dashboard/ship" class="bg-[#F97316] text-white px-6 py-3 rounded-lg font-semibold shadow-sm hover:opacity-95">Ship my packages</a>'
          + '<a href="/dashboard/mailbox" class="border border-slate-300 px-4 py-3 rounded-lg font-medium hover:bg-slate-50">Copy my US address</a>'
          + '</div>'
          + '</section>'
          + '<section class="grid grid-cols-1 lg:grid-cols-2 gap-4">'
          + '<article class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm">'
          + '<div class="flex items-baseline justify-between mb-3"><h2 class="text-lg font-semibold">Recent ship requests</h2><a href="/dashboard/ship-requests" class="text-[#2563EB] text-sm">See all →</a></div>'
          + '<div id="recent-ship-requests" aria-live="polite"></div>'
          + '</article>'
          + '<article class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm">'
          + '<div class="flex items-baseline justify-between mb-3"><h2 class="text-lg font-semibold">Quick actions</h2></div>'
          + '<div class="grid grid-cols-2 gap-2 text-sm">'
          + quickAction('/dashboard/recipients', '👥 Add recipient')
          + quickAction('/dashboard/inbound', '🛬 Pre-alert package')
          + quickAction('/dashboard/templates', '📑 Saved templates')
          + quickAction('/dashboard/settings/notifications', '🔔 Notifications')
          + quickAction('/dashboard/parcel-plus', '✨ Parcel+ features')
          + quickAction('/dashboard/profile', '👤 Profile')
          + '</div>'
          + '</article>'
          + '</section>'
          + '</main></div>';
        app.innerHTML = html;
        var main = document.getElementById('qcs-main');
        if (main) main.focus({ preventScroll: true });
      }

      function statCard(id, label, href, emoji, srAction) {
        return '<a href="' + window.qcsEscapeHTML(href) + '" class="bg-white border border-slate-200 rounded-xl p-5 shadow-sm hover:shadow-md transition-shadow focus:outline-none focus-visible:ring-2 focus-visible:ring-[#2563EB] block">'
          + '<div class="flex items-center justify-between mb-2">'
          + '<span class="text-2xl" aria-hidden="true">' + emoji + '</span>'
          + '<span class="text-xs text-slate-500">' + window.qcsEscapeHTML(srAction) + ' →</span>'
          + '</div>'
          + '<p class="text-xs uppercase tracking-wider text-slate-500 font-medium">' + window.qcsEscapeHTML(label) + '</p>'
          + '<p id="' + id + '" class="text-3xl font-bold mt-1">—</p>'
          + '</a>';
      }

      function quickAction(href, label) {
        return '<a href="' + window.qcsEscapeHTML(href) + '" class="border border-slate-200 rounded-lg px-3 py-2 hover:bg-slate-50 hover:border-slate-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-[#2563EB]">' + window.qcsEscapeHTML(label) + '</a>';
      }

      function attachLogoutAndStream() {
        QCS.bindLogout();
        try {
          streamHandle = QCS.openNotificationStream({
            token: token,
            statusSelector: '#dashboard-stream-status'
          });
        } catch (e) {}
        window.addEventListener('beforeunload', function () {
          if (streamHandle && typeof streamHandle.close === 'function') streamHandle.close();
        });
      }

      function loadStats() {
        // Locker summary + storage banner
        QCS.fetchJson('/api/v1/locker/summary')
          .then(function (s) {
            if (!s || !s.data) return;
            var stored = Number(s.data.stored_count || 0);
            setText('stat-locker', String(stored));
            renderStorageBanner(stored, s.data.next_expiry);
          })
          .catch(function () { setText('stat-locker', '0'); });

        // Inbound (expected) — call list endpoint with reasonable limit
        QCS.fetchJson('/api/v1/inbound-tracking')
          .then(function (r) {
            var list = (r && r.data) || [];
            // Only count not-yet-received entries
            var pending = 0;
            for (var i = 0; i < list.length; i += 1) {
              var st = String(list[i].status || '').toLowerCase();
              if (st !== 'received' && st !== 'matched' && st !== 'cancelled') pending += 1;
            }
            setText('stat-inbound', String(pending));
          })
          .catch(function () { setText('stat-inbound', '0'); });

        // Ship requests pending
        QCS.fetchJson('/api/v1/ship-requests')
          .then(function (r) {
            var list = (r && r.data) || [];
            var pending = 0;
            var recent = [];
            for (var i = 0; i < list.length; i += 1) {
              var st = String(list[i].status || '').toLowerCase();
              if (st !== 'paid' && st !== 'completed' && st !== 'cancelled') pending += 1;
              if (recent.length < 5) recent.push(list[i]);
            }
            setText('stat-pending', String(pending));
            renderRecentShipRequests(recent);
          })
          .catch(function () {
            setText('stat-pending', '0');
            renderRecentShipRequests([]);
          });

        // Shipments in flight
        QCS.fetchJson('/api/v1/shipments')
          .then(function (r) {
            var list = (r && r.data) || [];
            var inflight = 0;
            for (var i = 0; i < list.length; i += 1) {
              var st = String(list[i].status || '').toLowerCase();
              if (st && st !== 'delivered' && st !== 'cancelled' && st !== 'returned') inflight += 1;
            }
            setText('stat-shipped', String(inflight));
          })
          .catch(function () { setText('stat-shipped', '0'); });
      }

      function renderRecentShipRequests(list) {
        var container = document.getElementById('recent-ship-requests');
        if (!container) return;
        if (!list || !list.length) {
          container.innerHTML = '<div class="text-center py-8">'
            + '<p class="text-slate-500 mb-3">No ship requests yet</p>'
            + '<a href="/dashboard/ship" class="inline-block bg-[#2563EB] text-white px-4 py-2 rounded-lg text-sm font-medium">Create your first request</a>'
            + '</div>';
          return;
        }
        var html = '<ul class="divide-y divide-slate-100">';
        list.forEach(function (sr) {
          var code = sr.confirmation_code || (sr.id ? sr.id.slice(0, 8) : '—');
          var total = QCS.formatMoney(sr.total || 0, 'USD');
          var date = sr.created_at ? QCS.formatDate(sr.created_at) : '';
          html += '<li class="py-2 flex items-center justify-between gap-3">'
            + '<a href="/dashboard/ship-requests/' + encodeURIComponent(sr.id) + '" class="text-[#2563EB] font-medium hover:underline truncate">' + window.qcsEscapeHTML(code) + '</a>'
            + '<div class="flex items-center gap-2 text-sm text-slate-500 shrink-0">'
            + '<span>' + window.qcsEscapeHTML(date) + '</span>'
            + '<span>' + window.qcsEscapeHTML(total) + '</span>'
            + QCS.statusBadge(sr.status)
            + '</div>'
            + '</li>';
        });
        html += '</ul>';
        container.innerHTML = html;
      }

      function renderStorageBanner(stored, nextExpiry) {
        if (!stored) return;
        var banner = document.getElementById('dashboard-banner');
        if (!banner) return;
        var daysUntil = nextExpiry ? Math.ceil((new Date(nextExpiry) - new Date()) / (24 * 60 * 60 * 1000)) : null;
        var html = '';
        if (daysUntil != null && daysUntil < 0) {
          html = bannerEl('danger', 'Free storage has expired',
            'Ship or dispose stored packages now to avoid daily fees.',
            '/dashboard/inbox', 'Review packages');
        } else if (daysUntil === 0) {
          html = bannerEl('warning', 'Last day of free storage',
            'Ship or dispose your packages today to avoid fees starting tomorrow.',
            '/dashboard/inbox', 'Review packages');
        } else if (daysUntil != null && daysUntil <= 5) {
          html = bannerEl('warning',
            'Free storage ends in ' + daysUntil + ' day' + (daysUntil === 1 ? '' : 's'),
            'Schedule shipping or pickup before ' + QCS.formatDate(nextExpiry) + '.',
            '/dashboard/inbox', 'Review packages');
        } else if (stored >= 8) {
          html = bannerEl('info', stored + ' packages in your locker',
            'Consider consolidating to save on shipping.',
            '/dashboard/parcel-plus', 'See consolidation savings');
        }
        if (html) banner.innerHTML = html;
      }

      function bannerEl(level, title, desc, href, ctaLabel) {
        var classes = {
          danger:  'bg-red-50 border-red-200 text-red-900',
          warning: 'bg-amber-50 border-amber-200 text-amber-900',
          info:    'bg-blue-50 border-blue-200 text-blue-900'
        }[level] || 'bg-slate-50 border-slate-200';
        return '<div class="border rounded-xl p-4 mb-6 flex flex-wrap items-center justify-between gap-3 ' + classes + '">'
          + '<div><p class="font-semibold">' + window.qcsEscapeHTML(title) + '</p>'
          + '<p class="text-sm opacity-90">' + window.qcsEscapeHTML(desc) + '</p></div>'
          + '<a href="' + window.qcsEscapeHTML(href) + '" class="font-medium underline whitespace-nowrap">' + window.qcsEscapeHTML(ctaLabel) + ' →</a>'
          + '</div>';
      }

      function setText(id, value) {
        var el = document.getElementById(id);
        if (el) el.textContent = value;
      }
    })();
  </script>
  <script src="/dashboard/mobile-nav.js"></script>
</body>

</html>
