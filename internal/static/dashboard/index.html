<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | QCS Cargo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>body{font-family:'Inter',sans-serif}h1,h2{font-family:'Plus Jakarta Sans',sans-serif}</style>
</head>
<body class="bg-[#F8FAFC] text-[#0F172A] min-h-screen">
  <a href="#main" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-50 focus:px-4 focus:py-2 focus:bg-white focus:rounded focus:outline focus:ring-2 focus:ring-[#2563EB]">Skip to main content</a>
  <div id="dashboard-app">
    <p class="p-8 text-slate-500">Loading…</p>
  </div>
  <script>
    (function() {
      const token = localStorage.getItem('qcs_access_token');
      if (!token) { window.location.href = '/login?redirect=' + encodeURIComponent('/dashboard'); return; }
      fetch('/api/v1/me', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(r => { if (!r.ok) { window.location.href = '/login?redirect=' + encodeURIComponent('/dashboard'); return null; } return r.json(); })
        .then(j => {
          if (!j) return;
          const user = j.data;
          const suiteCode = user.suite_code || '—';
          document.getElementById('dashboard-app').innerHTML = '\
            <div class="flex min-h-screen">\
              <aside class="w-64 bg-[#0F172A] text-white py-6 px-4">\
                <a href="/" class="font-bold text-lg block mb-8">QCS Cargo</a>\
                <nav class="space-y-1" aria-label="Main navigation">\
                  <a href="/dashboard" class="block py-2 px-3 rounded-lg bg-[#1E293B]" aria-current="page">Dashboard</a>\
                  <a href="/dashboard/inbox" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">My Packages</a>\
                  <a href="/dashboard/mailbox" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">My Mailbox</a>\
                  <a href="/dashboard/inbound" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Expected Packages</a>\
                  <a href="/dashboard/ship-requests" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Ship Requests</a>\
                  <a href="/dashboard/bookings" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Bookings</a>\
                  <a href="/dashboard/recipients" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Recipients</a>\
                  <a href="/dashboard/shipments" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Shipments</a>\
                  <a href="/dashboard/invoices" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Invoices</a>\
                  <a href="/dashboard/templates" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Templates</a>\
                  <a href="/dashboard/profile" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Profile</a>\
                  <a href="/dashboard/settings" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Settings</a>\
                </nav>\
                <p class="mt-8 text-slate-400 text-sm">Suite: ' + suiteCode + '</p>\
                <button type="button" id="logout-btn" class="mt-4 text-sm text-slate-400 hover:text-white">Sign out</button>\
              </aside>\
              <main id="main" class="flex-1 p-8">\
                <nav aria-label="Breadcrumb" class="mb-4"><ol class="flex items-center gap-2 text-sm text-slate-600"><li class="text-[#0F172A] font-medium" aria-current="page">Dashboard</li></ol></nav>\
                <h1 class="text-3xl font-bold text-[#0F172A] mb-8">Dashboard</h1>\
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">\
                  <a href="/dashboard/inbox" class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm hover:shadow-md">\
                    <p class="text-slate-500 text-sm">Packages in Locker</p>\
                    <p id="stat-locker" class="text-2xl font-bold text-[#0F172A]">—</p>\
                  </a>\
                  <a href="/dashboard/inbound" class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm hover:shadow-md">\
                    <p class="text-slate-500 text-sm">Expected Arrivals</p>\
                    <p class="text-2xl font-bold text-[#0F172A]">0</p>\
                  </a>\
                  <a href="/dashboard/ship-requests" class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm hover:shadow-md">\
                    <p class="text-slate-500 text-sm">Pending Ship Requests</p>\
                    <p class="text-2xl font-bold text-[#0F172A]">0</p>\
                  </a>\
                  <a href="/dashboard/shipments" class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm hover:shadow-md">\
                    <p class="text-slate-500 text-sm">Shipped This Month</p>\
                    <p class="text-2xl font-bold text-[#0F172A]">0</p>\
                  </a>\
                </div>\
                <a href="/dashboard/ship" class="inline-block bg-[#F97316] text-white px-8 py-4 rounded-lg font-semibold text-lg mb-6">Ship My Packages</a>\
                <p class="text-slate-600 mb-4">Quick: <a href="/dashboard/mailbox" class="text-[#2563EB]">Copy My QCS Address</a> · <a href="/shipping-calculator" class="text-[#2563EB]">Calculator</a></p>\
              </main>\
            </div>';
          fetch('/api/v1/locker/summary', { headers: { 'Authorization': 'Bearer ' + token } })
            .then(r => r.ok ? r.json() : null)
            .then(s => {
              if (s && s.data) {
                document.getElementById('stat-locker').textContent = s.data.stored_count ?? '0';
                const stored = s.data.stored_count ?? 0;
                const nextExpiry = s.data.next_expiry || '';
                const daysUntil = nextExpiry ? Math.ceil((new Date(nextExpiry) - new Date()) / (24*60*60*1000)) : null;
                const expired = daysUntil != null && daysUntil < 0;
                const lastDay = daysUntil === 0;
                const within5Days = daysUntil != null && daysUntil >= 1 && daysUntil <= 5;
                const highCount = stored >= 8;
                let banner = '';
                if (expired && stored > 0) {
                  banner = '<div class="mb-6 rounded-lg border border-red-200 bg-red-50 p-4"><p class="text-red-800 font-medium">Free storage has expired. Ship or dispose to avoid fees. <a href="/dashboard/inbox" class="underline">View packages in My Packages</a></p></div>';
                } else if (lastDay && stored > 0) {
                  banner = '<div class="mb-6 rounded-lg border border-amber-200 bg-amber-50 p-4"><p class="text-amber-800 font-medium">Last day of free storage. Ship or dispose packages today. <a href="/dashboard/inbox" class="underline">View in My Packages</a></p></div>';
                } else if (within5Days && stored > 0) {
                  const d = new Date(nextExpiry);
                  const y = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
                  banner = '<div class="mb-6 rounded-lg border border-amber-200 bg-amber-50 p-4"><p class="text-amber-800 font-medium">Package(s) start storage fees in ' + daysUntil + ' day(s). Free storage expires ' + y + '. <a href="/dashboard/inbox" class="underline">View in My Packages</a></p></div>';
                } else if (highCount && !within5Days && !lastDay && !expired) {
                  banner = '<div class="mb-6 rounded-lg border border-slate-200 bg-slate-50 p-4"><p class="text-slate-800 font-medium">' + stored + ' packages in locker. <a href="/dashboard/inbox" class="underline">View in My Packages</a></p></div>';
                }
                if (banner) {
                  const main = document.querySelector('main');
                  const breadcrumb = main && main.querySelector('nav[aria-label="Breadcrumb"]');
                  if (breadcrumb && breadcrumb.nextElementSibling) {
                    breadcrumb.insertAdjacentHTML('afterend', banner);
                  } else if (main) {
                    main.insertAdjacentHTML('afterbegin', banner);
                  }
                }
              }
            });
          document.getElementById('logout-btn').onclick = () => {
            fetch('/api/v1/auth/logout', { method: 'POST', credentials: 'include' }).then(() => { localStorage.removeItem('qcs_access_token'); window.location.href = '/'; });
          };
        });
    })();
  </script>
</body>
</html>
