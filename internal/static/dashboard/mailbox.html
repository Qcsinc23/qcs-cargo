<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Mailbox | QCS Cargo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif
    }

    h1,
    h2 {
      font-family: 'Plus Jakarta Sans', sans-serif
    }
  </style>
  <link rel="stylesheet" href="/dashboard/pwa-shell.css" />
  <link rel="stylesheet" href="/dashboard/mobile-nav.css" />
</head>

<body class="bg-[#F8FAFC] text-[#0F172A] min-h-screen">
  <div id="app">Loading…</div>
  <script src="/dashboard/pwa-shell.js"></script>
  <script>
    (function () {
      if (window.QCSPWA && typeof window.QCSPWA.initBase === 'function') { window.QCSPWA.initBase({ registerSW: true, keyboard: true, utilityDock: true }); }
      const token = localStorage.getItem('qcs_access_token');
      if (!token) { window.location.href = '/login?redirect=' + encodeURIComponent('/dashboard/mailbox'); return; }
      fetch('/api/v1/me', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(r => { if (!r.ok) { window.location.href = '/login'; return null; } return r.json(); })
        .then(j => {
          if (!j) return;
          function qcsEscapeHTML(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
          }

          function sidebar(user, active) {
            const suiteCode = (user && user.suite_code) || '—';
            const links = [
              { href: '/dashboard', label: 'Dashboard', id: 'dashboard' },
              { href: '/dashboard/inbox', label: 'My Packages', id: 'inbox' },
              { href: '/dashboard/mailbox', label: 'My Mailbox', id: 'mailbox' },
              { href: '/dashboard/inbound', label: 'Expected Packages', id: 'inbound' },
              { href: '/dashboard/ship-requests', label: 'Ship Requests', id: 'ship-requests' },
              { href: '/dashboard/bookings', label: 'Bookings', id: 'bookings' },
              { href: '/dashboard/recipients', label: 'Recipients', id: 'recipients' },
              { href: '/dashboard/shipments', label: 'Shipments', id: 'shipments' },
              { href: '/dashboard/invoices', label: 'Invoices', id: 'invoices' },
              { href: '/dashboard/templates', label: 'Templates', id: 'templates' },
              { href: '/dashboard/parcel-plus', label: 'Parcel+', id: 'parcel-plus' },
          { href: '/dashboard/profile', label: 'Profile', id: 'profile' },
              { href: '/dashboard/settings', label: 'Settings', id: 'settings' }
            ];

            let navHtml = '';
            links.forEach(link => {
              const isActive = (active === link.id);
              navHtml += `<a href="${link.href}" class="block py-2 px-3 rounded-lg ${isActive ? 'bg-[#1E293B]' : 'hover:bg-[#1E293B]'}">${link.label}</a>`;
            });

            return `<div class="flex min-h-screen">
              <aside class="w-64 bg-[#0F172A] text-white py-6 px-4">
                <a href="/" class="font-bold text-lg block mb-8">QCS Cargo</a>
                <nav class="space-y-1" aria-label="Main navigation">
                  ${navHtml}
                </nav>
                <p class="mt-8 text-slate-400 text-sm">Suite: ${qcsEscapeHTML(suiteCode)}</p>
                <button type="button" id="logout-btn" class="mt-4 text-sm text-slate-400 hover:text-white">Sign out</button>
              </aside>`;
          }

          const user = j.data;
          const suiteCode = user.suite_code || '—';
          const name = user.name || 'Your Name';
          const address = '35 Obrien St, E12\nKearny, NJ 07032';
          const fullAddress = name + '\n35 Obrien St, E12, Suite ' + suiteCode + '\nKearny, NJ 07032';
          const main = '<main class="flex-1 p-8">' +
            '<nav aria-label="Breadcrumb" class="mb-4"><ol class="flex items-center gap-2 text-sm text-slate-600"><li><a href="/dashboard" class="text-[#2563EB] hover:underline">Dashboard</a></li><li aria-hidden="true">/</li><li class="text-[#0F172A] font-medium" aria-current="page">My Mailbox</li></ol></nav>' +
            '<h1 class="text-3xl font-bold text-[#0F172A] mb-8">My Mailbox</h1>' +
            '<div class="bg-white rounded-xl border border-slate-200 p-8 max-w-lg">' +
            '<p class="font-mono text-lg whitespace-pre-line mb-4">' + fullAddress.replace(/\n/g, '<br>') + '</p>' +
            '<button type="button" id="copy-btn" class="bg-[#2563EB] text-white px-4 py-2 rounded-lg font-medium">Copy address</button>' +
            '</div>' +
            '<p class="mt-8 text-slate-600 text-sm">Use this address when shopping at US stores. Include your suite code (' + suiteCode + ') so we can match packages to you.</p>' +
            '<p class="mt-4 text-slate-600 text-sm"><a href="/dashboard/inbound" class="text-[#2563EB]">Track incoming packages</a></p>' +
            '</main></div>';
          document.getElementById('app').innerHTML = sidebar(user, 'mailbox') + main;

          // Securely set dynamic text content to prevent XSS
          const addressEl = document.querySelector('main .bg-white p');
          if (addressEl) {
            addressEl.textContent = fullAddress;
            addressEl.style.whiteSpace = 'pre-line';
          }

          document.getElementById('copy-btn').onclick = () => { navigator.clipboard.writeText(fullAddress); alert('Address copied.'); };
          document.getElementById('logout-btn').onclick = () => {
            fetch('/api/v1/auth/logout', { method: 'POST', credentials: 'include' }).then(() => { localStorage.removeItem('qcs_access_token'); window.location.href = '/'; });
          };
        });
    })();
  </script>
  <script src="/dashboard/mobile-nav.js"></script>
</body>

</html>
