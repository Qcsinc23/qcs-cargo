<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking Templates | QCS Cargo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>body{font-family:'Inter',sans-serif}h1,h2{font-family:'Plus Jakarta Sans',sans-serif}</style>
</head>
<body class="bg-[#F8FAFC] text-[#0F172A] min-h-screen">
  <div id="app">Loading…</div>
  <script>
    (function() {
      const token = localStorage.getItem('qcs_access_token');
      if (!token) { window.location.href = '/login?redirect=' + encodeURIComponent('/dashboard/templates'); return; }
      const auth = { headers: { 'Authorization': 'Bearer ' + token } };

      function sidebar(user, active) {
        const suiteCode = (user && user.suite_code) || '—';
        return '<div class="flex min-h-screen"><aside class="w-64 bg-[#0F172A] text-white py-6 px-4">' +
          '<a href="/" class="font-bold text-lg block mb-8">QCS Cargo</a>' +
          '<nav class="space-y-1">' +
          '<a href="/dashboard" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Dashboard</a>' +
          '<a href="/dashboard/inbox" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">My Packages</a>' +
          '<a href="/dashboard/ship" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Ship My Packages</a>' +
          '<a href="/dashboard/ship-requests" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Ship Requests</a>' +
          '<a href="/dashboard/recipients" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Recipients</a>' +
          '<a href="/dashboard/shipments" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Shipments</a>' +
          '<a href="/dashboard/invoices" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Invoices</a>' +
          '<a href="/dashboard/templates" class="block py-2 px-3 rounded-lg ' + (active === 'templates' ? 'bg-[#1E293B]' : 'hover:bg-[#1E293B]') + '">Templates</a>' +
          '<a href="/dashboard/profile" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Profile</a>' +
          '<a href="/dashboard/settings" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Settings</a>' +
          '</nav><p class="mt-8 text-slate-400 text-sm">Suite: ' + suiteCode + '</p>' +
          '<button type="button" id="logout-btn" class="mt-4 text-sm text-slate-400 hover:text-white">Sign out</button></aside>';
      }

      function deleteTemplate(tid, btn) {
        if (!confirm('Delete this template? This cannot be undone.')) return;
        btn.disabled = true;
        fetch('/api/v1/templates/' + tid, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + localStorage.getItem('qcs_access_token') } })
          .then(r => { if (r.status === 204) location.reload(); else btn.disabled = false; });
      }

      Promise.all([
        fetch('/api/v1/me', auth).then(r => r.ok ? r.json() : null),
        fetch('/api/v1/templates', auth).then(r => r.ok ? r.json() : null)
      ]).then(([me, res]) => {
        if (!me) { window.location.href = '/login'; return; }
        const user = me.data;
        const list = (res && res.data) || [];
        let main = '<main class="flex-1 p-8">' +
          '<nav aria-label="Breadcrumb" class="mb-4"><ol class="flex items-center gap-2 text-sm text-slate-600"><li><a href="/dashboard" class="text-[#2563EB] hover:underline">Dashboard</a></li><li aria-hidden="true">/</li><li class="text-[#0F172A] font-medium" aria-current="page">Templates</li></ol></nav>' +
          '<h1 class="text-3xl font-bold text-[#0F172A] mb-2">Booking Templates</h1>' +
          '<p class="text-slate-600 mb-6">' + list.length + ' template(s)</p>';
        if (list.length === 0) {
          main += '<div class="bg-white rounded-xl border border-slate-200 p-12 text-center">' +
            '<p class="text-slate-600 mb-4">No templates yet.</p>' +
            '<a href="/dashboard/bookings" class="text-[#2563EB] font-medium">Create a booking to save as template</a></div>';
        } else {
          main += '<div class="bg-white rounded-xl border border-slate-200 overflow-hidden">' +
            '<table class="w-full"><thead class="bg-slate-50 border-b border-slate-200"><tr>' +
            '<th class="text-left py-3 px-4 font-medium text-slate-600">Name</th>' +
            '<th class="text-left py-3 px-4 font-medium text-slate-600">Service</th>' +
            '<th class="text-left py-3 px-4 font-medium text-slate-600">Destination</th>' +
            '<th class="text-left py-3 px-4 font-medium text-slate-600">Used</th>' +
            '<th class="text-left py-3 px-4 font-medium text-slate-600"></th></tr></thead><tbody>';
          list.forEach(t => {
            main += '<tr class="border-b border-slate-100 hover:bg-slate-50">' +
              '<td class="py-3 px-4 font-medium">' + (t.name || '—') + '</td>' +
              '<td class="py-3 px-4">' + (t.service_type || '—') + '</td>' +
              '<td class="py-3 px-4">' + (t.destination_id || '—') + '</td>' +
              '<td class="py-3 px-4 text-slate-500">' + (t.use_count != null ? t.use_count : 0) + '</td>' +
              '<td class="py-3 px-4"><button type="button" class="text-red-600 hover:text-red-800 text-sm" data-id="' + t.id + '">Delete</button></td></tr>';
          });
          main += '</tbody></table></div>';
        }
        main += '</main></div>';
        document.getElementById('app').innerHTML = sidebar(user, 'templates') + main;
        document.getElementById('logout-btn').onclick = () => {
          fetch('/api/v1/auth/logout', { method: 'POST', credentials: 'include' }).then(() => { localStorage.removeItem('qcs_access_token'); window.location.href = '/'; });
        };
        document.querySelectorAll('button[data-id]').forEach(btn => {
          btn.onclick = () => deleteTemplate(btn.getAttribute('data-id'), btn);
        });
      });
    })();
  </script>
</body>
</html>
