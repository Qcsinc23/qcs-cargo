<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | QCS Cargo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif
    }

    h1,
    h2 {
      font-family: 'Plus Jakarta Sans', sans-serif
    }
  </style>
  <link rel="stylesheet" href="/dashboard/pwa-shell.css" />
  <link rel="stylesheet" href="/dashboard/mobile-nav.css" />
</head>

<body class="bg-[#F8FAFC] text-[#0F172A] min-h-screen">
  <div id="app">Loading…</div>
  <script src="/dashboard/pwa-shell.js"></script>
  <script>
    (function () {
      if (window.QCSPWA && typeof window.QCSPWA.initBase === 'function') { window.QCSPWA.initBase({ registerSW: true, keyboard: true, utilityDock: true }); }
      const token = localStorage.getItem('qcs_access_token');
      if (!token) { window.location.href = '/login?redirect=' + encodeURIComponent('/dashboard/profile'); return; }
      const auth = { headers: { 'Authorization': 'Bearer ' + token } };

      function sidebar(user, active) {
        const suiteCode = (user && user.suite_code) || '—';
        const links = [
          { href: '/dashboard', label: 'Dashboard', id: 'dashboard' },
          { href: '/dashboard/inbox', label: 'My Packages', id: 'inbox' },
          { href: '/dashboard/mailbox', label: 'My Mailbox', id: 'mailbox' },
          { href: '/dashboard/inbound', label: 'Expected Packages', id: 'inbound' },
          { href: '/dashboard/ship-requests', label: 'Ship Requests', id: 'ship-requests' },
          { href: '/dashboard/bookings', label: 'Bookings', id: 'bookings' },
          { href: '/dashboard/recipients', label: 'Recipients', id: 'recipients' },
          { href: '/dashboard/shipments', label: 'Shipments', id: 'shipments' },
          { href: '/dashboard/invoices', label: 'Invoices', id: 'invoices' },
          { href: '/dashboard/templates', label: 'Templates', id: 'templates' },
          { href: '/dashboard/parcel-plus', label: 'Parcel+', id: 'parcel-plus' },
          { href: '/dashboard/profile', label: 'Profile', id: 'profile' },
          { href: '/dashboard/settings', label: 'Settings', id: 'settings' }
        ];

        let navHtml = '';
        links.forEach(link => {
          const isActive = (active === link.id);
          navHtml += `<a href="${link.href}" class="block py-2 px-3 rounded-lg ${isActive ? 'bg-[#1E293B]' : 'hover:bg-[#1E293B]'}">${link.label}</a>`;
        });

        return `<div class="flex min-h-screen">
          <aside class="w-64 bg-[#0F172A] text-white py-6 px-4">
            <a href="/" class="font-bold text-lg block mb-8">QCS Cargo</a>
            <nav class="space-y-1" aria-label="Main navigation">
              ${navHtml}
            </nav>
            <p class="mt-8 text-slate-400 text-sm">Suite: ${qcsEscapeHTML(suiteCode)}</p>
            <button type="button" id="logout-btn" class="mt-4 text-sm text-slate-400 hover:text-white">Sign out</button>
          </aside>`;
      }

      fetch('/api/v1/me', auth).then(r => r.ok ? r.json() : null).then(me => {
        if (!me) { window.location.href = '/login'; return; }
        const user = me.data;
        let main = '<main class="flex-1 p-8">' +
          '<nav aria-label="Breadcrumb" class="mb-4"><ol class="flex items-center gap-2 text-sm text-slate-600"><li><a href="/dashboard" class="text-[#2563EB] hover:underline">Dashboard</a></li><li aria-hidden="true">/</li><li class="text-[#0F172A] font-medium" aria-current="page">Profile</li></ol></nav>' +
          '<h1 class="text-3xl font-bold text-[#0F172A] mb-6">Profile</h1>' +
          '<form id="profile-form" class="bg-white rounded-xl border border-slate-200 p-6 max-w-lg">' +
          '<label class="block text-sm font-medium text-slate-700 mb-1">Name</label>' +
          '<input type="text" name="name" value="' + qcsEscapeHTML(user.name || '') + '" class="w-full border border-slate-300 rounded-lg px-3 py-2 mb-4" />' +
          '<label class="block text-sm font-medium text-slate-700 mb-1">Email</label>' +
          '<input type="email" value="' + qcsEscapeHTML(user.email || '') + '" disabled class="w-full border border-slate-200 rounded-lg px-3 py-2 mb-4 bg-slate-50 text-slate-500" />' +
          '<label class="block text-sm font-medium text-slate-700 mb-1">Phone</label>' +
          '<input type="text" name="phone" value="' + qcsEscapeHTML(user.phone || '') + '" class="w-full border border-slate-300 rounded-lg px-3 py-2 mb-4" />' +
          '<label class="block text-sm font-medium text-slate-700 mb-1">Address (street)</label>' +
          '<input type="text" name="address_street" value="' + qcsEscapeHTML(user.address_street || '') + '" class="w-full border border-slate-300 rounded-lg px-3 py-2 mb-4" />' +
          '<label class="block text-sm font-medium text-slate-700 mb-1">City</label>' +
          '<input type="text" name="address_city" value="' + qcsEscapeHTML(user.address_city || '') + '" class="w-full border border-slate-300 rounded-lg px-3 py-2 mb-4" />' +
          '<label class="block text-sm font-medium text-slate-700 mb-1">State</label>' +
          '<input type="text" name="address_state" value="' + qcsEscapeHTML(user.address_state || '') + '" class="w-full border border-slate-300 rounded-lg px-3 py-2 mb-4" />' +
          '<label class="block text-sm font-medium text-slate-700 mb-1">ZIP</label>' +
          '<input type="text" name="address_zip" value="' + qcsEscapeHTML(user.address_zip || '') + '" class="w-full border border-slate-300 rounded-lg px-3 py-2 mb-4" />' +
          '<p class="text-slate-500 text-sm mb-4">Suite: ' + qcsEscapeHTML(user.suite_code || '—') + '</p>' +
          '<button type="submit" class="bg-[#F97316] text-white px-6 py-2 rounded-lg font-medium">Save changes</button>' +
          '<p id="profile-msg" class="mt-3 text-sm text-emerald-600 hidden">Profile updated.</p>' +
          '</form></main></div>';
        document.getElementById('app').innerHTML = sidebar(user, 'profile') + main;
        document.getElementById('logout-btn').onclick = () => {
          fetch('/api/v1/auth/logout', { method: 'POST', credentials: 'include' }).then(() => { localStorage.removeItem('qcs_access_token'); window.location.href = '/'; });
        };
        document.getElementById('profile-form').onsubmit = function (e) {
          e.preventDefault();
          const fd = new FormData(this);
          const body = {};
          ['name', 'phone', 'address_street', 'address_city', 'address_state', 'address_zip'].forEach(k => { const v = fd.get(k); if (v != null) body[k] = v; });
          fetch('/api/v1/me', { method: 'PATCH', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
            .then(r => r.ok ? r.json() : null).then(() => {
              document.getElementById('profile-msg').classList.remove('hidden');
              setTimeout(() => document.getElementById('profile-msg').classList.add('hidden'), 3000);
            });
        };
      });
    })();
  </script>
  <script src="/dashboard/mobile-nav.js"></script>
</body>

</html>
