<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email | QCS Cargo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>body{font-family:'Inter',sans-serif}h1{font-family:'Plus Jakarta Sans',sans-serif}</style>
</head>
<body class="bg-[#F8FAFC] text-[#0F172A] min-h-screen flex items-center justify-center px-6">
  <div class="max-w-md w-full text-center">
    <h1 class="text-2xl font-bold mb-6">Signing you in…</h1>
    <p id="status" class="text-slate-600">Verifying your magic link.</p>
  </div>
  <script>
    (function() {
      const params = new URLSearchParams(location.search);
      const token = params.get('token');
      const redirectTo = params.get('redirectTo') || '/dashboard';
      const status = document.getElementById('status');
      if (!token) {
        status.textContent = 'Missing token. Please use the link from your email.';
        return;
      }
      fetch('/api/v1/auth/magic-link/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token }),
        credentials: 'include'
      }).then(r => r.json()).then(j => {
        if (j.data && j.data.access_token) {
          status.textContent = 'Success! Redirecting…';
          localStorage.setItem('qcs_access_token', j.data.access_token);
          window.location.href = redirectTo;
        } else {
          status.textContent = j.error?.message || 'Invalid or expired link.';
        }
      }).catch(() => { status.textContent = 'Network error. Please try again.'; });
    })();
  </script>
</body>
</html>
