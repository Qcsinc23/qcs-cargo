<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Sign-In Link | QCS Cargo</title>
  <meta name="description" content="Verify your QCS Cargo magic sign-in link." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/public.css" />
</head>
<body>
  <main class="page" style="min-height:100vh; display:flex; align-items:center; justify-content:center;" aria-live="polite">
    <section class="section-card center" style="max-width:520px; width:100%;">
      <p class="eyebrow" style="margin-bottom:6px;">Account Verification</p>
      <h1 class="page-title" style="font-size:2rem;">Signing you in...</h1>
      <p id="status" class="lead" style="margin:0 auto;">Verifying your magic link.</p>
      <div class="actions" style="margin-top:16px; justify-content:center;">
        <a class="btn btn-light" href="/login">Back to Sign In</a>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const token = params.get('token');
      const redirectTo = params.get('redirectTo') || '/dashboard';
      const status = document.getElementById('status');

      function safeParseJSON(response) {
        return response.text().then((text) => {
          if (!text) return {};
          try {
            return JSON.parse(text);
          } catch (_) {
            return { raw: text };
          }
        });
      }

      function withCacheBust(url) {
        return url + (url.includes('?') ? '&' : '?') + 't=' + Date.now();
      }

      async function clearLegacyCaches() {
        try {
          if ('serviceWorker' in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map((reg) => reg.unregister()));
          }
          if ('caches' in window) {
            const keys = await caches.keys();
            const target = keys.filter((k) => k.indexOf('qcs-cargo-') === 0);
            await Promise.all(target.map((k) => caches.delete(k)));
          }
        } catch (_) {
          // Ignore cache cleanup errors; continue sign-in redirect.
        }
      }

      if (!token) {
        status.textContent = 'Missing token. Please use the link from your email.';
        return;
      }

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 15000);

      fetch('/api/v1/auth/magic-link/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token }),
        credentials: 'include',
        signal: controller.signal
      })
        .then((r) => safeParseJSON(r).then((j) => ({ r, j })))
        .then(({ r, j }) => {
          if (j.data && j.data.access_token) {
            status.textContent = 'Success. Redirecting...';
            try {
              localStorage.setItem('qcs_access_token', j.data.access_token);
              if (j.data.session_id) {
                localStorage.setItem('qcs_session_id', j.data.session_id);
              }
            } catch (_) {
              status.textContent = 'Could not save sign-in state. Please disable private mode and try again.';
              return;
            }
            var redirectScheduled = false;
            function doRedirect() {
              if (redirectScheduled) return;
              redirectScheduled = true;
              window.location.replace(withCacheBust(redirectTo));
            }
            clearLegacyCaches().finally(() => { setTimeout(doRedirect, 100); });
            setTimeout(doRedirect, 4000);
          } else {
            status.textContent = j.error?.message || (r.ok ? 'Invalid or expired link.' : 'Could not complete sign-in.');
          }
        })
        .catch((err) => {
          if (err && err.name === 'AbortError') {
            status.textContent = 'Sign-in is taking too long. Please try the link again.';
            return;
          }
          status.textContent = 'Network error. Please try again.';
        })
        .finally(() => clearTimeout(timeout));
    })();
  </script>
</body>
</html>
