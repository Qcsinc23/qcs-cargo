<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | QCS Cargo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>body{font-family:'Inter',sans-serif}h1,h2{font-family:'Plus Jakarta Sans',sans-serif}</style>
  <script src="/admin/common.js"></script>
</head>
<body class="bg-[#F8FAFC] text-[#0F172A] min-h-screen">
  <a href="#main" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-50 focus:px-4 focus:py-2 focus:bg-white focus:rounded focus:outline focus:ring-2 focus:ring-[#2563EB]">Skip to main content</a>
  <div id="app">Loading…</div>
  <script>
    (function() {
      const token = localStorage.getItem('qcs_access_token');
      if (!token) { window.location.href = '/login?redirect=' + encodeURIComponent('/admin'); return; }
      const auth = { headers: { 'Authorization': 'Bearer ' + token } };

      function notificationBell() {
        return '<div class="relative mb-4">' +
          '<button type="button" id="admin-notification-btn" class="p-2 rounded-lg hover:bg-[#1E293B] text-white" aria-label="Notifications">' +
          '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>' +
          '</button>' +
          '<div id="admin-notification-dropdown" class="hidden absolute left-0 top-full mt-1 w-64 bg-white rounded-lg shadow-lg border border-slate-200 py-2 z-10">' +
          '<p class="px-4 py-2 text-sm font-medium text-slate-700 border-b border-slate-100">Notifications</p>' +
          '<p class="px-4 py-4 text-slate-500 text-sm">No new notifications</p>' +
          '</div></div>';
      }

      fetch('/api/v1/me', auth).then(r => {
        if (!r.ok) { window.location.href = '/login?redirect=' + encodeURIComponent('/admin'); return null; }
        return r.json();
      }).then(me => {
        if (!me) return;
        const user = me.data;
        if (user.role !== 'admin') { window.location.href = '/dashboard'; return; }

        fetch('/api/v1/admin/dashboard', auth).then(r => r.ok ? r.json() : null).then(dash => {
          const k = (dash && dash.data) || {};
          const sidebar = '<div class="flex min-h-screen"><aside class="w-64 bg-[#0F172A] text-white py-6 px-4">' +
            '<a href="/" class="font-bold text-lg block mb-2">QCS Cargo</a>' +
            notificationBell() +
            '<p class="text-amber-400 text-sm font-medium mb-2">Admin</p>' +
            '<nav class="space-y-1" aria-label="Main navigation">' +
            '<a href="/admin" class="block py-2 px-3 rounded-lg bg-[#1E293B]" aria-current="page">Dashboard</a>' +
            '<a href="/warehouse" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Warehouse</a>' +
            '<a href="/admin/ship-requests" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Ship Requests</a>' +
            '<a href="/admin/locker-packages" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Locker Packages</a>' +
            '<a href="/admin/service-queue" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Service Queue</a>' +
            '<a href="/admin/unmatched" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Unmatched</a>' +
            '<a href="/admin/bookings" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Bookings</a>' +
            '<a href="/admin/users" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Users</a>' +
            '<a href="/admin/activity" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Activity</a>' +
            '<a href="/admin/storage-report" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Storage Report</a>' +
            '<a href="/admin/reports" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Reports</a>' +
            '<a href="/admin/settings" class="block py-2 px-3 rounded-lg hover:bg-[#1E293B]">Settings</a>' +
            '</nav>' +
            '<a href="/dashboard" class="block mt-6 text-sm text-slate-400 hover:text-white">Customer Dashboard</a>' +
            '<button type="button" id="logout-btn" class="mt-4 text-sm text-slate-400 hover:text-white">Sign out</button></aside>';
          const pendingN = (k.service_queue_count ?? 0) + (k.unmatched_count ?? 0) + (k.pending_ship_count ?? 0);
          const main = '<main id="main" class="flex-1 p-8">' +
            '<nav aria-label="Breadcrumb" class="mb-4"><ol class="flex items-center gap-2 text-sm text-slate-600"><li class="text-[#0F172A] font-medium" aria-current="page">Admin Dashboard</li></ol></nav>' +
            '<h1 class="text-3xl font-bold text-[#0F172A] mb-8">Admin Dashboard</h1>' +
            '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6">' +
            '<a href="/admin/locker-packages" class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm hover:shadow-md">' +
            '<p class="text-slate-500 text-sm">Locker Packages</p><p class="text-2xl font-bold text-[#0F172A]">' + (k.locker_packages_count ?? '—') + '</p></a>' +
            '<a href="/admin/ship-requests" class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm hover:shadow-md">' +
            '<p class="text-slate-500 text-sm">Ship Requests</p><p class="text-2xl font-bold text-[#0F172A]">' + (k.ship_requests_count ?? '—') + '</p></a>' +
            '<a href="/admin/bookings" class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm hover:shadow-md">' +
            '<p class="text-slate-500 text-sm">Bookings</p><p class="text-2xl font-bold text-[#0F172A]">' + (k.bookings_count ?? '—') + '</p></a>' +
            '<a href="/admin/service-queue" class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm hover:shadow-md">' +
            '<p class="text-slate-500 text-sm">Service Queue</p><p class="text-2xl font-bold text-[#0F172A]">' + (k.service_queue_count ?? '—') + '</p></a>' +
            '<a href="/admin/unmatched" class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm hover:shadow-md">' +
            '<p class="text-slate-500 text-sm">Unmatched</p><p class="text-2xl font-bold text-[#0F172A]">' + (k.unmatched_count ?? '—') + '</p></a>' +
            '</div>' +
            '<div class="mt-8"><h2 class="text-xl font-bold text-[#0F172A] mb-4">Pending actions</h2>' +
            '<ul class="space-y-2">' +
            '<li><a href="/admin/service-queue" class="text-[#2563EB] hover:underline">Service queue (' + (k.service_queue_count ?? 0) + ')</a></li>' +
            '<li><a href="/admin/unmatched" class="text-[#2563EB] hover:underline">Unmatched packages (' + (k.unmatched_count ?? 0) + ')</a></li>' +
            '<li><a href="/admin/ship-requests?status=pending_payment" class="text-[#2563EB] hover:underline">Ship requests pending payment (' + (k.pending_ship_count ?? 0) + ')</a></li>' +
            '</ul></div>' +
            '<div class="mt-8"><h2 class="text-xl font-bold text-[#0F172A] mb-4">Reports</h2>' +
            '<p class="text-slate-600 mb-2"><a href="/admin/storage-report" class="text-[#2563EB] hover:underline">Storage Report</a> — packages stored, weight, expiring soon, fees today</p>' +
            '<p class="text-slate-600"><a href="/admin/reports" class="text-[#2563EB] hover:underline">Revenue, Shipments & Customers</a> — revenue by period, shipment counts, customer count</p></div>' +
            '<div class="mt-8"><h2 class="text-xl font-bold text-[#0F172A] mb-4">Today\'s schedule</h2>' +
            '<div id="today-schedule">Loading…</div></div>' +
            '</main></div>';
          document.getElementById('app').innerHTML = sidebar + main;
          document.getElementById('logout-btn').onclick = () => {
            fetch('/api/v1/auth/logout', { method: 'POST', credentials: 'include' }).then(() => { localStorage.removeItem('qcs_access_token'); window.location.href = '/'; });
          };
          var notifBtn = document.getElementById('admin-notification-btn');
          var notifDrop = document.getElementById('admin-notification-dropdown');
          if (notifBtn && notifDrop) {
            notifBtn.onclick = function() { notifDrop.classList.toggle('hidden'); };
            document.addEventListener('click', function(e) {
              if (!notifDrop.contains(e.target) && !notifBtn.contains(e.target)) notifDrop.classList.add('hidden');
            });
          }
          fetch('/api/v1/admin/bookings/today', auth).then(r => r.ok ? r.json() : null).then(function(res) {
            var el = document.getElementById('today-schedule');
            if (!el) return;
            var list = (res && res.data) || [];
            if (list.length === 0) { el.innerHTML = '<p class="text-slate-500 text-sm">No bookings today.</p>'; return; }
            el.innerHTML = '<ul class="bg-white rounded-xl border border-slate-200 divide-y"><li class="px-4 py-2 text-sm font-medium text-slate-600">Time</li>' +
              list.map(function(b) {
                return '<li class="px-4 py-3 flex justify-between"><span class="font-mono text-sm">' + (b.time_slot || '—') + '</span><span class="text-slate-600">' + (b.confirmation_code || b.user_id || '—') + '</span></li>';
              }).join('') + '</ul>';
          }).catch(function() {
            var el = document.getElementById('today-schedule');
            if (el) el.innerHTML = '<p class="text-slate-500 text-sm">Could not load schedule.</p>';
          });
        });
      });
    })();
  </script>
</body>
</html>
