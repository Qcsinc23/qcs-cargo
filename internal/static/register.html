<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | QCS Cargo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>body{font-family:'Inter',sans-serif}h1,h2{font-family:'Plus Jakarta Sans',sans-serif}</style>
</head>
<body class="bg-[#F8FAFC] text-[#0F172A] min-h-screen">
  <header class="bg-[#0F172A] text-white py-4 px-6">
    <nav class="max-w-6xl mx-auto flex justify-between items-center">
      <a href="/" class="font-bold text-lg">QCS Cargo</a>
      <div class="flex gap-6">
        <a href="/how-it-works">How It Works</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
        <a href="/login">Sign In</a>
      </div>
    </nav>
  </header>
  <main class="max-w-md mx-auto px-6 py-16">
    <h1 class="text-3xl font-bold text-[#0F172A] mb-8">Get Your Free US Address</h1>
    <p class="text-slate-600 mb-6">Sign up in 60 seconds. We’ll give you a unique suite code and US mailing address.</p>
    <form id="register-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Name</label>
        <input type="text" name="name" required class="w-full h-10 rounded-lg border border-slate-200 px-3" placeholder="Your name" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input type="email" name="email" required class="w-full h-10 rounded-lg border border-slate-200 px-3" placeholder="you@example.com" />
      </div>
      <button type="submit" class="w-full bg-[#F97316] text-white py-2 rounded-lg font-medium h-10">Create account</button>
    </form>
    <p id="form-status" class="mt-4 text-sm hidden"></p>
    <p class="mt-6 text-slate-600">Already have an account? <a href="/login" class="text-[#2563EB] font-medium">Sign in</a></p>
  </main>
  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = e.target.name.value;
      const email = e.target.email.value;
      const status = document.getElementById('form-status');
      status.classList.remove('hidden');
      try {
        const r = await fetch('/api/v1/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email })
        });
        const j = await r.json();
        if (r.ok) {
          status.textContent = 'Account created! Your suite code: ' + (j.data?.suite_code || '—') + '. Check your email or sign in with a magic link.';
          status.className = 'mt-4 text-sm text-green-600';
          e.target.reset();
        } else {
          status.textContent = j.error?.message || 'Sign up failed.';
          status.className = 'mt-4 text-sm text-red-600';
        }
      } catch (err) { status.textContent = 'Network error.'; status.className = 'mt-4 text-sm text-red-600'; }
    });
  </script>
</body>
</html>
