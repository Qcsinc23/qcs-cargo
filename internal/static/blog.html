<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog | QCS Cargo</title>
    <meta name="description" content="News, announcements, and shipping tips from QCS Cargo." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/public.css" />
</head>

<body>
    <a href="#main" class="skip-link">Skip to main content</a>
    <header class="site-header">
        <div class="nav-shell">
            <a class="brand" href="/"><img src="/web/images/logo.svg" alt="QCS Cargo"
                    style="height:36px;width:auto;" /></a>
            <nav class="nav-links" aria-label="Main navigation">
                <a class="nav-link" href="/how-it-works">How It Works</a>
                <a class="nav-link" href="/about">About</a>
                <a class="nav-link" href="/contact">Contact</a>
                <a class="nav-link" href="/login">Sign In</a>
            </nav>
        </div>
    </header>

    <main class="page" id="main">
        <div class="breadcrumb"><a href="/">Home</a><span>/</span><span class="current">Blog</span></div>

        <section class="hero reveal"
            style="background: var(--brand); color: #fff; padding: 60px 0; grid-template-columns: 1fr 0.8fr;">
            <div class="reveal delay-1">
                <h1 style="color: #fff; margin-bottom: 16px;">Latest from the Blog</h1>
                <p class="lead" style="color: #cbd5e1;">Tips, news, and guides for smooth logistics across the
                    Caribbean.</p>
            </div>
            <div class="hero-media reveal delay-2">
                <img src="/web/images/public/hero-blog.png" alt="Logistics magazine aesthetic"
                    style="max-height: 250px; border-radius: 12px;" />
            </div>
        </section>

        <div class="grid-3" id="blog-grid">
            <p class="muted text-small text-center animate-pulse" style="grid-column: 1 / -1; padding: 40px 0;">
                Loading posts...</p>
        </div>
        </section>
    </main>

    <footer class="footer">
        <div class="shell">
            <p>QCS Cargo · 35 Obrien St, E12, Kearny, NJ 07032 · 201-249-0929</p>
            <p>
                <a href="/legal/terms">Terms</a>
                <a href="/legal/privacy">Privacy</a>
                <a href="/legal/shipping-policy">Shipping Policy</a>
            </p>
        </div>
    </footer>

    <script src="/scripts/blog.js"></script>
</body>

</html>
