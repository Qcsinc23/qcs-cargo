<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | QCS Cargo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif
        }

        h1,
        h2 {
            font-family: 'Plus Jakarta Sans', sans-serif
        }
    </style>
</head>

<body class="bg-[#F8FAFC] text-[#0F172A] min-h-screen">
    <header class="bg-[#0F172A] text-white py-4 px-6">
        <nav class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="/" class="font-bold text-lg">QCS Cargo</a>
            <a href="/login" class="opacity-90 text-sm">Back to Sign In</a>
        </nav>
    </header>
    <main class="max-w-md mx-auto px-6 py-16">
        <div id="form-view">
            <h1 class="text-3xl font-bold mb-3">Forgot Password</h1>
            <p class="text-slate-600 mb-8">Enter your email and we'll send you a reset link.</p>
            <form id="forgot-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1" for="email">Email address</label>
                    <input id="email" type="email" name="email" required
                        class="w-full h-11 rounded-lg border border-slate-200 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="you@example.com" />
                </div>
                <button type="submit" id="submit-btn"
                    class="w-full bg-[#2563EB] text-white py-2 rounded-lg font-medium h-11 hover:bg-blue-700 transition-colors">
                    Send Reset Link
                </button>
            </form>
            <p id="form-error" class="mt-4 text-sm text-red-600 hidden"></p>
            <p class="mt-6 text-sm text-slate-500">Remembered? <a href="/login" class="text-[#2563EB] font-medium">Sign
                    in</a></p>
        </div>
        <div id="success-view" class="hidden text-center">
            <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-8 h-8 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold mb-3">Check Your Email</h2>
            <p class="text-slate-600 mb-6">If an account exists for <strong id="sent-email"></strong>, you'll receive a
                reset link shortly.</p>
            <p class="mt-4"><a href="/login" class="text-[#2563EB] text-sm font-medium">← Back to Sign In</a></p>
        </div>
    </main>
    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.textContent = 'Sending…';
            document.getElementById('form-error').classList.add('hidden');
            try {
                await fetch('/api/v1/auth/password/forgot', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email })
                });
                document.getElementById('sent-email').textContent = email;
                document.getElementById('form-view').classList.add('hidden');
                document.getElementById('success-view').classList.remove('hidden');
            } catch {
                const e2 = document.getElementById('form-error');
                e2.textContent = 'Network error. Please try again.';
                e2.classList.remove('hidden');
                btn.disabled = false; btn.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>

</html>
