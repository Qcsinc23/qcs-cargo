<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | QCS Cargo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif
        }

        h1,
        h2 {
            font-family: 'Plus Jakarta Sans', sans-serif
        }
    </style>
</head>

<body class="bg-[#F8FAFC] text-[#0F172A] min-h-screen">
    <header class="bg-[#0F172A] text-white py-4 px-6">
        <nav class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="/" class="font-bold text-lg">QCS Cargo</a>
            <a href="/login" class="opacity-90 text-sm">Sign In</a>
        </nav>
    </header>
    <main class="max-w-md mx-auto px-6 py-16">
        <div id="form-view">
            <h1 class="text-3xl font-bold mb-3">Set New Password</h1>
            <p class="text-slate-600 mb-8">Choose a strong password (min 8 characters).</p>
            <form id="reset-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1" for="password">New Password</label>
                    <input id="password" type="password" name="password" required minlength="8"
                        class="w-full h-11 rounded-lg border border-slate-200 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1" for="confirm">Confirm Password</label>
                    <input id="confirm" type="password" name="confirm" required minlength="8"
                        class="w-full h-11 rounded-lg border border-slate-200 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                </div>
                <button type="submit" id="submit-btn"
                    class="w-full bg-[#2563EB] text-white py-2 rounded-lg font-medium h-11 hover:bg-blue-700 transition-colors">
                    Update Password
                </button>
            </form>
            <p id="form-error" class="mt-4 text-sm text-red-600 hidden"></p>
        </div>
        <div id="invalid-token" class="hidden text-center">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-8 h-8 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold mb-3">Link Expired</h2>
            <p class="text-slate-600 mb-6">This reset link is invalid or has expired. Reset links are valid for 1 hour.
            </p>
            <a href="/forgot-password" class="bg-[#2563EB] text-white px-6 py-2 rounded-lg font-medium">Request a New
                Link</a>
        </div>
        <div id="success-view" class="hidden text-center">
            <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-8 h-8 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold mb-3">Password Updated!</h2>
            <p class="text-slate-600 mb-6">Your password has been changed. You can now sign in.</p>
            <a href="/login" class="bg-[#2563EB] text-white px-6 py-2 rounded-lg font-medium">Sign In</a>
        </div>
    </main>
    <script>
        const token = new URLSearchParams(location.search).get('token');
        if (!token) {
            document.getElementById('form-view').classList.add('hidden');
            document.getElementById('invalid-token').classList.remove('hidden');
        }
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const errEl = document.getElementById('form-error');
            const btn = document.getElementById('submit-btn');
            errEl.classList.add('hidden');
            if (password !== confirm) {
                errEl.textContent = 'Passwords do not match.';
                errEl.classList.remove('hidden'); return;
            }
            btn.disabled = true; btn.textContent = 'Updating…';
            try {
                const r = await fetch('/api/v1/auth/password/reset', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const j = await r.json();
                if (!r.ok) {
                    if (r.status === 400 && j.error?.code === 'INVALID_TOKEN') {
                        document.getElementById('form-view').classList.add('hidden');
                        document.getElementById('invalid-token').classList.remove('hidden');
                    } else {
                        errEl.textContent = j.error?.message || 'Update failed.';
                        errEl.classList.remove('hidden');
                        btn.disabled = false; btn.textContent = 'Update Password';
                    }
                    return;
                }
                document.getElementById('form-view').classList.add('hidden');
                document.getElementById('success-view').classList.remove('hidden');
            } catch {
                errEl.textContent = 'Network error. Please try again.';
                errEl.classList.remove('hidden');
                btn.disabled = false; btn.textContent = 'Update Password';
            }
        });
    </script>
</body>

</html>
