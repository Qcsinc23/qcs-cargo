# PRD 13.1: Lint, test, build WASM, build binary.
name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - run: golangci-lint run ./cmd/... ./internal/...
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./cmd/... ./internal/... -race -cover
  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go build -o qcs-server ./cmd/server
      - run: go build -o qcs-migrate ./cmd/migrate

  smoke-test:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run smoke test
        run: chmod +x scripts/smoke-test.sh && ./scripts/smoke-test.sh
        env:
          SMOKE_PORT: "3998"
          JWT_SECRET: "smoke-test-secret-key-at-least-32-chars"
          RESEND_API_KEY: "re_test_fake"
          STRIPE_SECRET_KEY: "sk_test_fake"
          STRIPE_WEBHOOK_SECRET: "whsec_fake"
          FROM_EMAIL: "test@qcs-cargo.com"

  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: GOOS=js GOARCH=wasm go build -o web/app.wasm ./frontend
