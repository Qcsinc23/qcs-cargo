name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  go-version-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Resolve Go version from go.mod
        id: go_version
        shell: bash
        run: |
          version="$(awk '/^go /{print $2; exit}' go.mod)"
          if [[ -z "$version" ]]; then
            echo "go.mod is missing a Go version directive" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.go_version.outputs.value }}
          check-latest: true
      - name: Confirm toolchain version
        shell: bash
        run: |
          echo "CI Go policy: use go.mod go directive"
          echo "go.mod go version: ${{ steps.go_version.outputs.value }}"
          go version

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [go-version-policy]
    steps:
      - uses: actions/checkout@v4
      - name: Resolve Go version from go.mod
        id: go_version
        shell: bash
        run: |
          if [[ -f go.mod ]]; then
            version="$(awk '/^go /{print $2; exit}' go.mod)"
            if [[ -n "$version" ]]; then
              echo "value=$version" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "value=stable" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.go_version.outputs.value }}
          check-latest: true
          cache: true
      - name: Run Go tests
        run: go test ./... -count=1

  govulncheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [go-version-policy]
    steps:
      - uses: actions/checkout@v4
      - name: Resolve Go version from go.mod
        id: go_version
        shell: bash
        run: |
          if [[ -f go.mod ]]; then
            version="$(awk '/^go /{print $2; exit}' go.mod)"
            if [[ -n "$version" ]]; then
              echo "value=$version" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "value=stable" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.go_version.outputs.value }}
          check-latest: true
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: $(go env GOPATH)/bin/govulncheck ./...
