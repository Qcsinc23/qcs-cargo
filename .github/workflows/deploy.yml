name: Deploy Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      PROD_HOST: ${{ vars.PROD_HOST != '' && vars.PROD_HOST || '82.25.85.157' }}
      PROD_USER: ${{ vars.PROD_USER != '' && vars.PROD_USER || 'deploy' }}
      PROD_APP_DIR: ${{ vars.PROD_APP_DIR != '' && vars.PROD_APP_DIR || '/opt/qcs-cargo' }}
      PROD_PUBLIC_URL: ${{ vars.PROD_PUBLIC_URL != '' && vars.PROD_PUBLIC_URL || 'https://qcs-cargo.com' }}
      DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && 'origin/main' || github.event.workflow_run.head_sha }}
    steps:
      - name: Validate deploy configuration
        env:
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_SSH_KNOWN_HOSTS: ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
        run: |
          if [[ -z "${PROD_SSH_PRIVATE_KEY:-}" ]]; then
            echo "Missing required repository secret: PROD_SSH_PRIVATE_KEY" >&2
            exit 1
          fi
          if [[ -z "${PROD_SSH_KNOWN_HOSTS:-}" ]]; then
            echo "Missing required repository secret: PROD_SSH_KNOWN_HOSTS" >&2
            exit 1
          fi
          if [[ "${PROD_USER}" == "root" ]]; then
            echo "Production deploys must use a non-root SSH user. Set repository variable PROD_USER." >&2
            exit 1
          fi

      - name: Configure SSH key
        env:
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_SSH_KNOWN_HOSTS: ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PROD_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$PROD_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy validated commit
        run: |
          cat > /tmp/qcs-remote-deploy.sh <<'EOF'
          set -euo pipefail
          cd "$PROD_APP_DIR"

          deploy_state_dir="$PROD_APP_DIR/.deploy"
          release_dir="$deploy_state_dir/releases/$DEPLOY_REF"
          last_successful_sha_file="$deploy_state_dir/last-successful.sha"

          mkdir -p "$deploy_state_dir/releases"
          git fetch origin main
          git worktree remove --force "$release_dir" >/dev/null 2>&1 || true

          cleanup() {
            git worktree remove --force "$release_dir" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          git worktree add --force --detach "$release_dir" "$DEPLOY_REF"

          previous_sha=""
          if [[ -f "$last_successful_sha_file" ]]; then
            previous_sha="$(tr -d '[:space:]' < "$last_successful_sha_file")"
          else
            previous_sha="$(git rev-parse HEAD)"
          fi

          APP_DIR="$release_dir" \
          COMPOSE_PROJECT_NAME='qcs-cargo' \
          DEPLOY_STATE_DIR="$deploy_state_dir" \
          ENV_FILE="$PROD_APP_DIR/.env" \
          LAST_SUCCESSFUL_SHA_FILE="$last_successful_sha_file" \
          TARGET_BRANCH='main' \
          DEPLOY_REF="$DEPLOY_REF" \
          APP_URL="$PROD_PUBLIC_URL" \
          PREVIOUS_SUCCESSFUL_SHA="$previous_sha" \
          ROLLBACK_ON_FAILURE=1 \
          SKIP_GIT_PREP=1 \
          bash "$release_dir/scripts/deploy-production.sh"
          EOF

          for attempt in 1 2 3; do
            if ssh -i ~/.ssh/id_ed25519 \
              -o BatchMode=yes \
              -o ConnectTimeout=15 \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=4 \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              "$PROD_USER@$PROD_HOST" \
              PROD_APP_DIR="$PROD_APP_DIR" \
              DEPLOY_REF="$DEPLOY_REF" \
              PROD_PUBLIC_URL="$PROD_PUBLIC_URL" \
              'bash -se' < /tmp/qcs-remote-deploy.sh; then
              exit 0
            fi
            if [[ "$attempt" -eq 3 ]]; then
              echo "deploy ssh command failed after $attempt attempts" >&2
              exit 1
            fi
            sleep $((attempt * 15))
          done

      - name: Verify public production endpoints
        run: |
          curl --fail --silent --show-error --max-time 10 "$PROD_PUBLIC_URL/api/v1/health"
          curl --fail --silent --show-error --max-time 10 "$PROD_PUBLIC_URL/" >/tmp/qcs-home.html
          grep -q "<title>" /tmp/qcs-home.html
